<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1.0,user-scalable=no">
<title>Tジマ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

:root{
  --safe-b:env(safe-area-inset-bottom,0px);
  --bg:#0e1225; --panel:#151d35; --muted:#6b7a99; --bar-h:80px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);color:#e8ecf4;font-family:'Nunito',sans-serif;}

/* ─ LAYOUT ─ */
#game{display:flex;flex-direction:column;width:100%;height:100dvh;}
.pa{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
/* P2は常に正立 - local-modeによる回転廃止 */
#divider{height:3px;flex-shrink:0;background:linear-gradient(90deg,transparent,#4a2d8a,transparent);}

/* ─ HAND ─ */
.hand-area{flex-shrink:0;background:rgba(74,45,138,.12);border-top:1px solid rgba(74,45,138,.4);}
#p1-area .hand-area{padding-bottom:4px;}
#p2-hand-area{border-top:none;border-bottom:1px solid rgba(74,45,138,.4);}
#p2-area.local-mode #p2-hand-area{border-top:1px solid rgba(74,45,138,.4);border-bottom:none;}
.hand-scroll{display:flex;gap:6px;overflow-x:auto;padding:6px 8px 4px;min-height:82px;align-items:flex-end;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.hand-scroll::-webkit-scrollbar{display:none;}
.stat-bar{display:flex;align-items:center;gap:6px;padding:2px 8px;font-size:10px;color:var(--muted);}
.sbadge{background:rgba(255,255,255,.06);padding:1px 7px;border-radius:10px;font-weight:700;font-size:10px;white-space:nowrap;}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#22c55e;box-shadow:0 0 7px #22c55e;}
.tdot.off{background:#334;box-shadow:none;}

/* ─ CENTER ─ */
.ca{flex:1;display:flex;flex-direction:column;gap:4px;padding:4px 6px;min-height:0;overflow:hidden;}
.brow{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.brow.fr{flex:1;min-height:0;align-items:stretch;}
.zlbl{font-size:8px;color:var(--muted);font-weight:700;white-space:nowrap;text-align:center;}

/* ─ FIELD ─ */
.field-zone{flex:1;display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:3px 5px;min-height:38px;max-height:80px;border:1px dashed #1e2d4a;border-radius:6px;background:rgba(255,255,255,.015);overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}

/* ─ SHIELDS ─ */
.shields-row{display:flex;gap:3px;align-items:center;}
.sc{width:30px;height:44px;border-radius:5px;background:linear-gradient(145deg,#1e2d4a,#111827);border:2px solid #334d6e;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.5);}
.sc.broken{opacity:.2;filter:grayscale(1);}

/* ─ SIDE ─ */
.sidecol{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.pile{width:34px;height:48px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:12px;flex-shrink:0;cursor:pointer;position:relative;}
.deck-pile{background:linear-gradient(145deg,#1e2d4a,#111827);border:2px solid #334d6e;color:#8aa;box-shadow:0 2px 6px rgba(0,0,0,.5);}
.grave-pile{border:2px dashed #334;color:#556;}
.grave-pile .tc{position:absolute;inset:2px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;font-family:'Fredoka One',cursive;opacity:.8;}

/* ─ MANA ─ */
.mana-zone{flex:1;display:flex;gap:3px;flex-wrap:wrap;align-items:center;min-height:42px;padding:2px;}
.mc{width:28px;height:40px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:13px;border:2.5px solid white;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .12s,filter .12s;color:#fff;text-shadow:-1px -1px 0 #000,1px 1px 0 #000;}
.mc.tapped{transform:rotate(90deg);filter:brightness(.4);}

.mc.sel-mana{border-color:#fbbf24;box-shadow:0 0 0 2px #fbbf24;}

/* ─ CARDS ─ */
.card{width:36px;height:52px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;cursor:pointer;border:3px solid white;transition:transform .12s,filter .12s;flex-shrink:0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.6);position:relative;}
.card:active{transform:scale(.88);}
.hand-scroll .card{width:52px;height:72px;border-radius:9px;}
/* UNO風: 楕円と数字 */
.card .uno-oval{position:absolute;width:85%;height:72%;background:rgba(0,0,0,.25);border-radius:50%;border:none;transform:rotate(30deg);}
.hand-scroll .card .uno-oval{width:82%;height:70%;transform:rotate(-30deg);transform:rotate(30deg);}
.card .cn{position:relative;z-index:1;font-size:18px;line-height:1;color:#fff;text-shadow:-1.5px -1.5px 0 #000,1.5px -1.5px 0 #000,-1.5px 1.5px 0 #000,1.5px 1.5px 0 #000;}
.hand-scroll .card .cn{font-size:28px;}
.card .cn-tl{position:absolute;top:2px;left:3px;font-size:8px;color:#fff;text-shadow:-1px -1px 0 #000,1px 1px 0 #000;z-index:1;line-height:1;}
.card .cn-br{position:absolute;bottom:2px;right:3px;font-size:8px;color:#fff;text-shadow:-1px -1px 0 #000,1px 1px 0 #000;z-index:1;transform:rotate(180deg);line-height:1;}
.hand-scroll .card .cn-tl{font-size:11px;top:3px;left:4px;}
.hand-scroll .card .cn-br{font-size:11px;bottom:3px;right:4px;}
.ci{display:none;}
.card.tapped{transform:rotate(90deg);filter:brightness(.6);}
.card.linked{border-color:#fbbf24;}
.card.sel-atk{border-color:#22c55e;box-shadow:0 0 0 3px #22c55e;}
.red{background:#e63c1e;color:#fff;}
.blue{background:#0065b3;color:#fff;}
.green{background:#3d9e2c;color:#fff;}
.yellow{background:#fcd205;color:#fff;}
.card-back{background:#0065b3;border:3px solid white;font-size:18px;color:#fff;}

/* ─ ACTION BAR ─ */
#action-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,14,26,.97);border-top:2px solid #4a2d8a;padding:6px 10px;padding-bottom:calc(6px + var(--safe-b));z-index:100;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
#action-bar.top-mode{bottom:auto;top:0;border-top:none;border-bottom:2px solid #4a2d8a;padding-top:calc(6px + var(--safe-t,0px));padding-bottom:6px;}
#phase-label{font-size:10px;color:#7c9cca;font-weight:700;letter-spacing:1px;text-align:center;margin-bottom:5px;text-transform:uppercase;}
#room-badge{font-size:9px;color:#4a2d8a;text-align:center;margin-bottom:2px;letter-spacing:1px;}
#action-buttons{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;}
.btn{font-family:'Fredoka One',cursive;font-size:14px;padding:9px 16px;border:none;border-radius:22px;cursor:pointer;min-height:40px;transition:transform .1s,filter .1s;}
.btn:active{transform:scale(.92);filter:brightness(.85);}
.btn.disabled{opacity:.35;pointer-events:none;}
.p{background:#4a2d8a;color:#fff;}.g{background:#16a34a;color:#fff;}
.r{background:#dc2626;color:#fff;}.o{background:#c2410c;color:#fff;}
.b{background:#1d4ed8;color:#fff;}.n{background:#374151;color:#fff;}
.y{background:#b45309;color:#fff;}

/* ─ MODAL ─ */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:flex-end;justify-content:center;padding-bottom:calc(var(--safe-b)+6px);}
#modal-overlay.show{display:flex;}
#modal-overlay.top-modal{align-items:flex-start;padding-bottom:0;padding-top:calc(var(--safe-t,0px)+6px);}
#modal-box{background:#151d35;border:2px solid #4a2d8a;border-radius:18px 18px 12px 12px;padding:16px 14px 12px;width:min(100vw - 12px,420px);max-height:72dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
#modal-overlay.top-modal #modal-box{border-radius:12px 12px 18px 18px;}
#modal-title{font-family:'Fredoka One',cursive;font-size:16px;color:#a5b4fc;text-align:center;margin-bottom:6px;}
#modal-subtitle{font-size:11px;color:#7c8faa;text-align:center;margin-bottom:8px;}
#modal-list{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.mi{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border-radius:10px;padding:8px 10px;cursor:pointer;border:1.5px solid transparent;transition:background .12s;min-height:52px;}
.mi:active{background:rgba(74,45,138,.3);}
.mi.sel{border-color:#fbbf24;background:rgba(251,191,36,.08);}
.mcard{width:36px;height:50px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:18px;border:2.5px solid white;color:#fff;text-shadow:-1.5px -1.5px 0 #000,1.5px 1.5px 0 #000;position:relative;overflow:hidden;}
.mcard.tapped{transform:rotate(15deg);filter:brightness(.5);}
.iname{font-weight:900;font-size:13px;color:#e8ecf4;}
.idesc{color:#7c8faa;font-size:10px;line-height:1.3;}
#modal-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;}

/* ─ TOAST ─ */
#toast{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);background:rgba(74,45,138,.97);color:#fff;font-family:'Fredoka One',cursive;font-size:16px;padding:11px 22px;border-radius:12px;z-index:999;display:none;text-align:center;max-width:82vw;pointer-events:none;}

/* ─ CARD INFO ─ */
#cinfo{position:fixed;bottom:calc(var(--bar-h) + 8px);left:50%;transform:translateX(-50%);background:rgba(21,29,53,.98);border:1.5px solid #4a2d8a;border-radius:10px;padding:8px 14px;width:min(86vw,300px);font-size:11px;color:#bbb;z-index:300;display:none;text-align:center;pointer-events:none;}
#cinfo.show{display:block;}
#cinfo-title{font-family:'Fredoka One',cursive;font-size:15px;color:#a5b4fc;margin-bottom:3px;}

/* ─ WIN ─ */
#win-screen{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:900;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;}
#win-screen.show{display:flex;}
#win-title{font-family:'Fredoka One',cursive;font-size:34px;color:#fbbf24;text-align:center;text-shadow:0 0 24px #fbbf24;}
#win-sub{font-size:15px;color:#bbb;text-align:center;}

/* ─ EFFECTS ─ */
#fx-layer{position:fixed;inset:0;pointer-events:none;z-index:800;}
.fx-particle{position:absolute;border-radius:50%;animation:fx-pop .6s ease-out forwards;}
@keyframes fx-pop{0%{opacity:1;transform:scale(0) translate(0,0);}100%{opacity:0;transform:scale(1.5) translate(var(--dx),var(--dy));}}
.fx-flash{position:fixed;inset:0;pointer-events:none;animation:fx-flash .35s ease-out forwards;}
@keyframes fx-flash{0%{opacity:.7;}100%{opacity:0;}}
.fx-slam{position:absolute;border-radius:50%;border:4px solid currentColor;animation:fx-slam .5s ease-out forwards;}
@keyframes fx-slam{0%{opacity:1;transform:scale(.2);}80%{opacity:.8;}100%{opacity:0;transform:scale(3);}}
.fx-shield-break{position:absolute;font-size:48px;animation:fx-sb .6s ease-out forwards;}
@keyframes fx-sb{0%{opacity:1;transform:scale(1) rotate(0deg);}100%{opacity:0;transform:scale(2) rotate(20deg)translateY(-30px);}}
.fx-word{position:fixed;left:50%;top:40%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;text-align:center;pointer-events:none;animation:fx-word .9s ease-out forwards;z-index:900;}
@keyframes fx-word{0%{opacity:1;transform:translate(-50%,-50%) scale(.5);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2);}100%{opacity:0;transform:translate(-50%,-60%) scale(1);}}
.fx-direct{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;animation:fx-dir 1.4s ease-out forwards;}
@keyframes fx-dir{0%{opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{opacity:0;}}
</style>

</head>
<body>

<div id="game">
  <!-- P2エリア:
       オンライン正立: 手札(上) → マナ → シールド → フィールド(下)
       ローカルlocal-mode(180度回転): フィールド(上) → シールド → マナ → 手札(下) -->
  <div id="p2-area" class="pa">
    <div class="hand-area" id="p2-hand-area">
      <div class="stat-bar">
        <div class="tdot off" id="p2-dot"></div><b>P2</b>
        <span class="sbadge" id="p2-hc">手札0</span>
        <span class="sbadge" id="p2-mc">マナ0/0</span>
        <span class="sbadge" id="p2-sc">🛡5</span>
      </div>
      <div class="hand-scroll" id="p2-hand"></div>
    </div>
    <div class="ca">
      <div class="brow">
        <span class="zlbl" style="writing-mode:vertical-rl">マナ</span>
        <div class="mana-zone" id="p2-mana"></div>
      </div>
      <div class="brow" style="gap:10px;padding-left:2px">
        <div><div class="zlbl" style="text-align:left;margin-bottom:2px">シールド</div><div class="shields-row" id="p2-shields"></div></div>
        <div class="sidecol"><div class="zlbl">デッキ</div><div class="pile deck-pile" id="p2-deck-pile"><span id="p2-dc">0</span></div></div>
      </div>
      <div class="brow fr">
        <div style="flex:1;display:flex;flex-direction:column;min-height:0">
          <div class="zlbl" style="text-align:left;margin-bottom:2px">フィールド</div>
          <div class="field-zone" id="p2-field"></div>
        </div>
        <div class="sidecol"><div class="zlbl">墓地</div><div class="pile grave-pile" id="p2-grave" onclick="showGrave(2)"><span id="p2-gc">0</span></div></div>
      </div>
    </div>
  </div>

  <div id="divider"></div>

  <!-- P1 (bottom) -->
  <div id="p1-area" class="pa">
    <div class="ca">
      <div class="brow fr">
        <div style="flex:1;display:flex;flex-direction:column;min-height:0">
          <div class="zlbl" style="text-align:left;margin-bottom:2px">フィールド</div>
          <div class="field-zone" id="p1-field"></div>
        </div>
        <div class="sidecol"><div class="zlbl">墓地</div><div class="pile grave-pile" id="p1-grave" onclick="showGrave(1)"><span id="p1-gc">0</span></div></div>
      </div>
      <div class="brow" style="gap:10px;padding-left:2px">
        <div><div class="zlbl" style="text-align:left;margin-bottom:2px">シールド</div><div class="shields-row" id="p1-shields"></div></div>
        <div class="sidecol"><div class="zlbl">デッキ</div><div class="pile deck-pile" id="p1-deck-pile"><span id="p1-dc">0</span></div></div>
      </div>
      <div class="brow">
        <span class="zlbl" style="writing-mode:vertical-rl">マナ</span>
        <div class="mana-zone" id="p1-mana"></div>
      </div>
    </div>
    <div class="hand-area">
      <div class="hand-scroll" id="p1-hand"></div>
      <div class="stat-bar" style="margin-top:2px">
        <div class="tdot" id="p1-dot"></div><b>P1</b>
        <span class="sbadge" id="p1-hc">手札0</span>
        <span class="sbadge" id="p1-mc">マナ0/0</span>
        <span class="sbadge" id="p1-sc">🛡5</span>
      </div>
    </div>
  </div>
</div>

<div id="action-bar">
  <div id="room-badge"></div>
  <div id="phase-label">Tジマ</div>
  <div id="action-buttons"><button class="btn p" onclick="showTitleScreen()">起動中...</button></div>
</div>

<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title"></div>
    <div id="modal-subtitle"></div>
    <div id="modal-list"></div>
    <div id="modal-btns"></div>
  </div>
</div>

<div id="toast"></div>
<div id="cinfo"><div id="cinfo-title"></div><div id="cinfo-desc"></div></div>
<div id="fx-layer"></div>

<div id="win-screen">
  <div id="win-title"></div>
  <div id="win-sub"></div>
  <button class="btn p" style="font-size:17px;padding:12px 36px;margin-top:10px" onclick="retryGame()">もう一度</button>
</div>

<!-- フリーズ対策: 小さいリセットボタン -->
<button id="reset-btn" onclick="emergencyReset()"
  style="position:fixed;top:4px;right:4px;z-index:9999;
  background:rgba(80,80,80,0.6);color:#aaa;border:none;
  border-radius:6px;font-size:10px;padding:3px 7px;cursor:pointer;">
  ↺
</button>

<script>
'use strict';

// ── Firebase はwindow経由で受け取る（head内moduleで初期化）──
let db, ref, set, get, onValue, remove;
window._fbReady = new Promise(resolve => { window._fbResolve = resolve; });
window._fbReady.then(fb => { db=fb.db; ref=fb.ref; set=fb.set; get=fb.get; onValue=fb.onValue; remove=fb.remove; });

// ─ オンライン対戦状態 ─
let ONLINE = {
  enabled: false,   // オンラインモードか
  roomId: null,     // ルームID
  myPlayer: null,   // 自分は1か2か
  unsubscribe: null // onValue解除用
};

// ─ DBへ状態をプッシュ（自分のターンの操作後に呼ぶ）─
let _pushSeq = 0;
function pushState() {
  if (!ONLINE.enabled || !ONLINE.roomId || !db) return;
  const snap = serializeG();
  snap._seq = ++_pushSeq;
  snap._pusher = ONLINE.myPlayer; // 誰がpushしたか記録
  set(ref(db, `rooms/${ONLINE.roomId}/state`), snap).catch(e => console.error('pushState', e));
}

// ─ シリアライズ: FirebaseのJSON制限を回避 ─
// Firebase は null 値と配列インデックスを削除するため
// shields の null を -1 (整数) に、linkedWith をIDに変換
function serializeG() {
  // まずG全体を安全にコピー（循環参照除去）
  const seen = new WeakSet();
  const raw = JSON.parse(JSON.stringify(G, (k, v) => {
    if (k === 'linkedWith') return (v && typeof v === 'object') ? v.id : null;
    if (k === '_7selectMode' || k === 'fn') return undefined;
    if (k === 'selCard' || k === 'atkCard') return null;
    if (k === 'selMana') return [];
    return v;
  }));
  // shields の null を -1 に変換（Firebase が null を配列から削除するため）
  for (const p of ['1','2',1,2]) {
    const pl = raw.players && raw.players[p];
    if (!pl || !pl.shields) continue;
    pl.shields = pl.shields.map(s => (s === null || s === undefined) ? -1 : s);
  }
  return raw;
}

// ─ デシリアライズ: Firebaseから受け取ったデータをGに復元 ─
function deserializeG(snap) {
  // 文字列化→再パースで完全な独立コピーを作成
  const raw = JSON.parse(JSON.stringify(snap));

  // players を必ず {1:..., 2:...} の数値キーで取得
  const rawP = raw.players || {};
  const p1raw = rawP[1] || rawP['1'] || {};
  const p2raw = rawP[2] || rawP['2'] || {};

  // ゾーン配列を安全に変換（Firebaseがオブジェクト化した配列も対応）
  function toArr(v) {
    if (!v) return [];
    if (Array.isArray(v)) return v;
    // {0:x, 1:y, ...} 形式のオブジェクト
    if (typeof v === 'object') {
      const maxKey = Math.max(...Object.keys(v).map(Number).filter(n => !isNaN(n)));
      const arr = [];
      for (let i = 0; i <= maxKey; i++) arr.push(v[i] !== undefined ? v[i] : null);
      return arr;
    }
    return [];
  }

  function makePlayer(pr) {
    return {
      deck:      toArr(pr.deck),
      hand:      toArr(pr.hand),
      field:     toArr(pr.field),
      mana:      toArr(pr.mana),
      shields:   toArr(pr.shields).map(s => (s === -1 || s === null || s === undefined) ? null : s),
      graveyard: toArr(pr.graveyard),
    };
  }

  G = {
    turn:         parseInt(raw.turn) || 1,
    phase:        raw.phase || 'setup',
    isFirstTurn:  !!raw.isFirstTurn,
    pendingST:    toArr(raw.pendingST),
    gameOver:     !!raw.gameOver,
    _winner:      raw._winner ? parseInt(raw._winner) : null,
    _winReason:   raw._winReason || '',
    _pushSeq:     raw._seq || 0,
    selCard:      null,
    selMana:      [],
    atkCard:      null,
    _7selectMode: null,
    // オンライン対戦フェーズ管理
    onlinePhase:  raw.onlinePhase || null,
    _pendingAtk:  raw._pendingAtk || null,
    _blockerId:   raw._blockerId !== undefined ? raw._blockerId : null,
    _shieldConfirmed: raw._shieldConfirmed || false,
    players: {
      1: makePlayer(p1raw),
      2: makePlayer(p2raw),
    },
  };

  // linkedWith: ID → カードオブジェクト に復元
  const cardMap = {};
  for (const p of [1,2]) {
    const pl = G.players[p];
    for (const arr of [pl.hand, pl.field, pl.mana, pl.graveyard, pl.shields]) {
      arr.forEach(c => { if (c && c.id !== undefined) cardMap[c.id] = c; });
    }
  }
  for (const p of [1,2]) {
    const pl = G.players[p];
    for (const arr of [pl.hand, pl.field, pl.mana, pl.graveyard, pl.shields]) {
      arr.forEach(c => {
        if (!c || c.linkedWith === undefined || c.linkedWith === null) return;
        c.linkedWith = (typeof c.linkedWith === 'number') ? (cardMap[c.linkedWith] || null) : null;
      });
    }
  }
}

// ─ 相手の操作を受信して画面更新 ─
function subscribeRoom(roomId) {
  if (ONLINE.unsubscribe) ONLINE.unsubscribe();
  const stateRef = ref(db, `rooms/${roomId}/state`);
  const unsub = onValue(stateRef, snapshot => {
    const data = snapshot.val();
    if (!data) return;

    // ONLINE.myPlayer未設定またはsetupフェーズは無視
    if (!ONLINE.myPlayer) return;
    const myP = parseInt(ONLINE.myPlayer);
    const pusher = parseInt(data._pusher || 0);
    const phase = data.onlinePhase || null;

    // onlinePhaseがある場合: 誰が受け手かで判断してスキップを制御
    if(phase){
      // 受け手の判定
      const attPlayer = (data._pendingAtk && parseInt(data._pendingAtk.attPlayer)) || 0;
      const defPlayer = attPlayer===1?2:attPlayer===2?1:0;
      // 自分が攻撃側フェーズの受け手かどうか
      const iAmAtt = (myP===attPlayer);
      const iAmDef = (myP===defPlayer);

      // 自分がpushして自分に戻ってきたが、自分が次のアクションをすべきフェーズは処理
      // 例: 防御側がblock-queryでブロック選択→push(pusher=def)→defのsubscribeはskipしたい
      //     攻撃側がblock-queryをpush→attのsubscribeはskip、defのsubscribeは処理
      const skipPhases = {
        'block-query':    pusher===myP && iAmAtt,  // 攻撃側が自分でpushしたblock-queryはスキップ
        'block-resolve':  pusher===myP && iAmDef,  // 防御側が自分でpushしたblock-resolveはスキップ
        'shield-break':   pusher===myP && iAmDef,  // 防御側が自分でpushしたshield-breakはスキップ
        'shield-confirm': pusher===myP && iAmAtt,  // 攻撃側が自分でpushしたshield-confirmはスキップ
        'attack-continue':pusher===myP && iAmDef,  // 防御側が自分でpushしたattack-continueはスキップ
        'direct-attack':  pusher===myP && iAmAtt,
        'direct-attack':  pusher===myP && iAmAtt,  // 攻撃側が自分でpushしたdirect-attackはスキップ
      };
      if(skipPhases[phase]){return;}

      deserializeG(data);
      renderAll();
      adjustLayout();
      if(G.gameOver){showWinScreen();return;}
      handleOnlinePhase(phase, myP);
      return;
    }

    // onlinePhaseなし: 通常のターン進行
    // 自分がpushしたデータはスキップ（ローカルで既に反映済み）
    if(pusher === myP){return;}

    deserializeG(data);
    renderAll();
    adjustLayout();

    if(G.gameOver){showWinScreen();return;}

    const currentTurn = parseInt(G.turn);
    if(currentTurn === myP){
      setTimeout(() => phaseUntap(), 300);
    }else{
      setBar(`P${currentTurn}のターン — 相手の番です`, []);
    }
  });
  ONLINE.unsubscribe = () => unsub();
}

function showWinScreen(){
  const winner = G._winner || G.turn;
  document.getElementById('win-title').textContent = `🎉 P${winner} の勝利！`;
  document.getElementById('win-sub').textContent = G._winReason || '';
  document.getElementById('win-screen').classList.add('show');
}

// ─ オンライン時のアクションバー制御 ─
function updateBarForOnline() {
  if (!ONLINE.enabled) return;
  const isMyTurn = G.turn === ONLINE.myPlayer;
  const bar = document.getElementById('action-bar');
  // 自分が1なら下、2なら上（常に固定）
  if (bar) {
    bar.classList.toggle('top-mode', ONLINE.myPlayer === 2);
  }
  if (!isMyTurn) {
    setBar(`P${G.turn}のターン — 相手の番です`, []);
  }
}

};

// ═══════════════════════════════════
//  デッキ
// ═══════════════════════════════════
let _uid=0;
function mkCard(num,color){return{id:_uid++,num,color,tapped:false,summonedThisTurn:false,linkedWith:null,speedAttacker:false};}
function buildDeck(){
  const d=[];
  for(let n=0;n<=7;n++)for(const c of COLORS)d.push(mkCard(n,c));
  d.push(mkCard(8,'red'));d.push(mkCard(8,'blue'));
  d.push(mkCard(9,'green'));d.push(mkCard(9,'yellow'));
  return shuffle(d);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ═══════════════════════════════════
//  状態
// ═══════════════════════════════════
let G={};
function newPl(){return{deck:[],hand:[],field:[],mana:[],shields:[],graveyard:[]};}

function initGame(){
  _uid=0;
  G={turn:1,phase:'setup',isFirstTurn:true,pendingST:[],gameOver:false,
     selCard:null,     // 手札選択中カード（チャージ/召喚/攻撃）
     selMana:[],       // マナ選択中IDs
     atkCard:null,     // 攻撃宣言カード
     players:{1:newPl(),2:newPl()}};
  const d1=buildDeck(),d2=buildDeck();
  for(let i=0;i<5;i++){G.players[1].shields.push(d1.pop());G.players[2].shields.push(d2.pop());}
  G.players[1].deck=d1;G.players[2].deck=d2;
  for(let i=0;i<5;i++){G.players[1].hand.push(G.players[1].deck.pop());G.players[2].hand.push(G.players[2].deck.pop());}
}

// ═══════════════════════════════════
//  フェーズ進行
// ═══════════════════════════════════
function startGame(){
  initGame();
  renderAll();
  phaseUntap();
}

function phaseUntap(){
  if(ONLINE.enabled && parseInt(G.turn) !== parseInt(ONLINE.myPlayer)) {
    setBar(`P${G.turn}のターン — 相手の番です`,[]);
    return;
  }
  G.phase='untap';G.selCard=null;G.selMana=[];G.atkCard=null;
  const pl=G.players[G.turn];
  pl.field.forEach(c=>{c.tapped=false;c.summonedThisTurn=false;});
  pl.mana.forEach(c=>c.tapped=false);
  // バー位置 + P2エリア回転
  const bar=document.getElementById('action-bar');
  const p2area=document.getElementById('p2-area');
  if(ONLINE.enabled){
    const myP=parseInt(ONLINE.myPlayer)||1;
    if(bar) bar.classList.toggle('top-mode', myP===2);
    if(p2area) p2area.classList.remove('local-mode'); // オンラインは回転なし
  }else{
    if(bar) bar.classList.toggle('top-mode', G.turn===2);
    // P2は常に正立（local-mode廃止）
  }
  renderAll();
  adjustLayout();
  setBar(`P${G.turn} — アンタップ`,[{label:'ドローへ ▶',cls:'g',fn:phaseDraw}]);
}

// ドロー：自動（スキップなし）
function phaseDraw(){
  G.phase='draw';
  if(G.isFirstTurn&&G.turn===1){G.isFirstTurn=false;toast('先攻1ターン目はドローなし');setTimeout(phaseCharge,700);return;}
  if(!G.players[G.turn].deck.length){winGame(G.turn===1?2:1,'デッキ切れ');return;}
  const card=G.players[G.turn].deck.pop();
  G.players[G.turn].hand.push(card);
  fxDraw(G.turn,card);
  renderAll();
  setBar(`P${G.turn} — ドロー`,[]);
  setTimeout(phaseCharge,800);
}

// チャージ：手札を選択→チャージ or しない
function phaseCharge(){
  G.phase='charge';G.selCard=null;
  if(ONLINE.enabled&&G.turn!==ONLINE.myPlayer)return;
  renderAll();
  setBar(`P${G.turn} — マナチャージ`,[
    {label:'チャージ',cls:'b',fn:doCharge,id:'btn-charge'},
    {label:'しない ▶',cls:'n',fn:phaseSummon},
  ]);
  refreshChargeBtn();
}
function selectHandForCharge(card){
  if(G.phase!=='charge')return;
  G.selCard=(G.selCard&&G.selCard.id===card.id)?null:card;
  renderAll();refreshChargeBtn();
}
function refreshChargeBtn(){
  const btn=document.getElementById('btn-charge');
  if(btn)btn.classList.toggle('disabled',!G.selCard);
}
function doCharge(){
  if(!G.selCard)return;
  const p=G.turn,card=G.selCard;
  G.players[p].hand=G.players[p].hand.filter(c=>c.id!==card.id);
  G.players[p].mana.push(card);
  G.selCard=null;
  fxCharge(p,card);
  pushState();
  renderAll();
  setTimeout(phaseSummon,600);
}

// 召喚：手札を選択→召喚ボタン（毎回複数回召喚可）
function phaseSummon(){
  G.phase='summon';G.selCard=null;G.selMana=[];
  if(ONLINE.enabled&&G.turn!==ONLINE.myPlayer)return;
  renderAll();
  const hasPairs=hasLinkPairs(G.turn);
  const p=G.turn;
  const btns=[
    {label:'召喚',cls:'g',fn:doSummonSelected,id:'btn-summon'},
    {label:'攻撃へ ▶',cls:'o',fn:phaseAttack},
    {label:'エンド',cls:'n',fn:endTurn},
  ];
  if(hasPairs)btns.splice(1,0,{label:'リンク',cls:'b',fn:showLinkMenu});
  if(hasExTjia(p))btns.splice(0,0,{label:'⭐エクTジア宣言',cls:'y',fn:()=>declareExTjia(p)});
  setBar(`P${G.turn} — 召喚`,btns);
  refreshSummonBtn();
}
function selectHandForSummon(card){
  if(G.phase!=='summon')return;
  G.selCard=(G.selCard&&G.selCard.id===card.id)?null:card;
  G.selMana=[];
  renderAll();refreshSummonBtn();
}
function refreshSummonBtn(){
  const btn=document.getElementById('btn-summon');
  if(!btn)return;
  const ok=G.selCard&&canSummon(G.turn,G.selCard);
  btn.classList.toggle('disabled',!ok);
}
function doSummonSelected(){
  if(!G.selCard||!canSummon(G.turn,G.selCard)){toast('召喚できません');return;}
  const card=G.selCard,p=G.turn;
  const cost=getSummonCost(p,card);
  if(cost===0){G.selCard=null;completeSummon(p,card);return;}
  // マナ選択モーダル（複数選択）
  showManaSelectModal(p,card,cost);
}

function showManaSelectModal(p,card,cost){
  const untapped=G.players[p].mana.filter(c=>!c.tapped);
  let selIds=[];
  function selTotal(){return selIds.reduce((s,id)=>{const m=G.players[p].mana.find(c=>c.id===id);return s+(m&&m.num===9?2:1);},0);}

  function render(){
    const enough=selTotal()>=cost;
    showCustomModal(
      `マナを選択（コスト: ${cost}）`,
      `選択中: ${selTotal()}マナ / 必要: ${cost}マナ`,
      ()=>{
        // body
        const listEl=document.getElementById('modal-list');
        listEl.innerHTML='';
        untapped.forEach(m=>{
          const row=document.createElement('div');
          const isSel=selIds.includes(m.id);
          row.className='mi'+(isSel?' sel':'');
          row.innerHTML=`<div class="mcard ${m.color}">${m.num}</div><div style="flex:1"><div class="iname">${CJ[m.color]}${m.num}${m.num===9?' (2マナ)':''}</div></div>`;
          row.onclick=()=>{
            if(isSel){selIds=selIds.filter(i=>i!==m.id);}
            else{selIds.push(m.id);}
            render();
          };
          listEl.appendChild(row);
        });
      },
      [
        {label:`決定（${selTotal()}/${cost}）`,cls:'g',fn:()=>{
          if(selTotal()<cost){toast(`マナが足りません（${selTotal()}/${cost}）`);return;}
          // 色チェックなし: canSummonでゾーンに同色あるか確認済み。支払うマナは何色でもOK
          selIds.forEach(id=>{const m=G.players[p].mana.find(c=>c.id===id);if(m)m.tapped=true;});
          G.selCard=null;
          closeModal();
          completeSummon(p,card);
        }},
        {label:'キャンセル',cls:'r',fn:()=>{closeModal();renderAll();}}
      ]
    );
  }
  render();
}

// 攻撃：手札選択→攻撃ボタン→対象選択
function phaseAttack(){
  G.phase='attack';G.selCard=null;G.atkCard=null;
  if(ONLINE.enabled&&G.turn!==ONLINE.myPlayer)return;
  renderAll();
  setBar(`P${G.turn} — 攻撃`,[
    {label:'攻撃',cls:'r',fn:doAttackSelected,id:'btn-attack'},
    {label:'エンド',cls:'n',fn:endTurn},
  ]);
  refreshAttackBtn();
}
function selectFieldForAttack(card,p){
  if(G.phase!=='attack'||p!==G.turn)return;
  if(!canAttack(p,card)){toast(card.summonedThisTurn?'召喚酔いで攻撃不可':'タップ済み');return;}
  G.selCard=(G.selCard&&G.selCard.id===card.id)?null:card;
  renderAll();refreshAttackBtn();
}
function refreshAttackBtn(){
  const btn=document.getElementById('btn-attack');
  if(btn)btn.classList.toggle('disabled',!G.selCard);
}
function doAttackSelected(){
  if(!G.selCard)return;
  G.atkCard=G.selCard;G.selCard=null;
  showTargetModal(G.atkCard,G.turn);
}
function showTargetModal(atk,p){
  const opp=p===1?2:1;
  const shields=G.players[opp].shields.filter(Boolean);
  const tapped=G.players[opp].field.filter(c=>c.tapped&&(!c.linkedWith||c.linkRoot));
  const untappedBlockers=G.players[opp].field.filter(c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot));
  const btns=[];
  if(shields.length){
    btns.push({label:'シールドを攻撃',cls:'r',fn:()=>{closeModal();execShieldAttack(atk,p);}});
  }
  if(tapped.length){
    btns.push({label:'ナンバーズを攻撃',cls:'o',fn:()=>{closeModal();showCreaturePicker(atk,p);}});
  }
  // シールド0枚 → ダイレクトアタック可（ブロッカーがいればブロックされる）
  if(shields.length===0){
    btns.push({label:'ダイレクトアタック',cls:'r',fn:()=>{closeModal();execDirectWithBlock(atk,p,untappedBlockers);}});
  }
  if(atk.num===2)btns.push({label:'ヒラボン（手札捨て→破壊→攻撃）',cls:'y',fn:()=>{closeModal();showHirabonAttackDiscard(p);}});
  btns.push({label:'キャンセル',cls:'n',fn:()=>{closeModal();G.atkCard=null;phaseAttack();}});
  const breaker=(atk.num===0)?'トリプル':(atk.num===7||atk.num===9)?'ダブル':'';
  showSimpleModal(`${CJ[atk.color]}${atk.num}${breaker?'（'+breaker+'）':''}で攻撃`,btns,'攻撃対象を選択');
}

// シールド0枚でのダイレクトアタック（ブロッカーがいれば防御側がブロック選択）
function execDirectWithBlock(atk,p,blockers){
  if(blockers.length){
    const opp=p===1?2:1;
    if(ONLINE.enabled){
      // オンライン: block-queryフェーズで防御側に渡す（シールド攻撃と同じフロー）
      // ただしシールドはないのでblock-resolve後はダイレクトアタック
      G._pendingAtk={atkId:parseInt(atk.id), attPlayer:parseInt(p), isDirect:true};
      G.onlinePhase='block-query';
      atk.tapped=true;
      if(atk.linkedWith)atk.linkedWith.tapped=true;
      G.atkCard=null;
      pushState();
      setBar('相手がブロックを検討中...',[]);
      renderAll();
    }else{
      // ローカル: 防御側向けにモーダル表示
      showSimpleModal('ブロックしますか？',[
        {label:'ブロックする',cls:'g',fn:()=>{closeModal();showBlockPicker(atk,p,blockers);}},
        {label:'ブロックしない → ダイレクト',cls:'r',fn:()=>{closeModal();execDirectAttack(atk,p);}},
      ],`ブロッカー: ${blockers.map(c=>CJ[c.color]+c.num).join(' / ')}`,opp);
    }
  }else{
    if(ONLINE.enabled){
      // ブロッカーなし: 即ダイレクト
      G._pendingAtk={atkId:parseInt(atk.id), attPlayer:parseInt(p), isDirect:true, noBlock:true};
      G.onlinePhase='shield-break'; // シールドなし=直接confirm
      atk.tapped=true;
      if(atk.linkedWith)atk.linkedWith.tapped=true;
      G.atkCard=null;
      // shield-confirmフェーズへ（シールドはないのでダイレクト判定）
      G.onlinePhase='direct-attack';
      pushState();
      renderAll();
    }else{
      execDirectAttack(atk,p);
    }
  }
}

// シールド攻撃（ブロッカー選択は防御側）
function execShieldAttack(atk,p){
  const opp=p===1?2:1;
  if(ONLINE.enabled){
    // オンライン: _pendingAtkをセットしてpush → subscribeで防御側がブロック確認
    G._pendingAtk={atkId:parseInt(atk.id), attPlayer:parseInt(p)};
    G.onlinePhase='block-query';
    atk.tapped=true;
    if(atk.linkedWith)atk.linkedWith.tapped=true;
    G.atkCard=null;
    pushState();
    setBar('相手がブロックを検討中...',[]);
    renderAll();
  }else{
    // ローカル: 従来通り
    const blockers=G.players[opp].field.filter(c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot));
    if(blockers.length){
      showSimpleModal(`ブロックしますか？`,[
        {label:'ブロックする',cls:'g',fn:()=>{closeModal();showBlockPicker(atk,p,blockers);}},
        {label:'ブロックしない',cls:'r',fn:()=>{closeModal();doShieldBreak(atk,p);}},
      ],`ブロッカー: ${blockers.map(c=>CJ[c.color]+c.num).join(' / ')}`,opp);
    }else{
      doShieldBreak(atk,p);
    }
  }
}

function showBlockPicker(atk,p,blockers){
  const opp=p===1?2:1;
  showCardPicker(`ブロッカーを選択`,'選択して決定を押す',blockers,opp,false,
    (blocker)=>{
      closeModal();
      fxBlock(atk,p,blocker,opp);
      setTimeout(()=>{execCreatureAttack(atk,blocker,p);},600);
    },
    [{label:'ブロックしない',cls:'r',fn:()=>{closeModal();doShieldBreak(atk,p);}}],
    opp  // forPlayer = 防御側
  );
}

function doShieldBreak(atk,p){
  const opp=p===1?2:1,oppPl=G.players[opp];
  const idx=oppPl.shields.findIndex(s=>s!==null);
  if(idx===-1){execDirectAttack(atk,p);return;}
  const sc=oppPl.shields[idx];
  oppPl.shields[idx]=null;
  atk.tapped=true;
  if(atk.linkedWith)atk.linkedWith.tapped=true;
  G.atkCard=null;
  pushState();

  // ブレイカー数を決定
  const isTriple=(atk.num===0);
  const isDouble=(atk.num===7||atk.num===9||(atk.linkedWith&&(atk.num===5||atk.linkedWith.num===5)));
  fxShieldBreak(opp,isTriple);
  renderAll();

  if(isTriple){
    // トリプル：1枚目は直接墓地、残り2枚は手札
    const left=oppPl.shields.filter(Boolean).length;
    if(left>0){
      sendToGrave(opp,sc);
      setTimeout(()=>tripleMore(opp,p,2,()=>checkDirect(opp,p)),700);
    }else{
      breakShield(opp,sc);
      checkDirect(opp,p);
    }
  }else if(isDouble){
    // ダブル：1枚目を処理、シールドが残っていれば2枚目
    breakShield(opp,sc);
    const left2=oppPl.shields.filter(Boolean).length;
    if(left2>0){
      setTimeout(()=>{
        const idx2=oppPl.shields.findIndex(s=>s!==null);
        if(idx2!==-1){
          const sc2=oppPl.shields[idx2];
          oppPl.shields[idx2]=null;
          fxShieldBreak(opp,false);
          breakShield(opp,sc2);
          renderAll();
        }
        checkDirect(opp,p);
      },450);
    }else{
      checkDirect(opp,p);
    }
  }else{
    breakShield(opp,sc);
    checkDirect(opp,p);
  }
  renderAll();
}

function tripleMore(opp,p,rem,done){
  if(rem<=0){done();renderAll();return;}
  const oppPl=G.players[opp];
  const idx=oppPl.shields.findIndex(s=>s!==null);
  if(idx===-1){done();renderAll();return;}
  const sc=oppPl.shields[idx];
  oppPl.shields[idx]=null;
  fxShieldBreak(opp,false);
  breakShield(opp,sc);renderAll();
  setTimeout(()=>tripleMore(opp,p,rem-1,done),450);
}

function execCreatureAttack(atk,target,p){
  const opp=p===1?2:1;
  // リンクペアは両方タップ
  atk.tapped=true;
  if(atk.linkedWith)atk.linkedWith.tapped=true;
  G.atkCard=null;
  const a=getAtkPower(atk), d=getAtkPower(target);
  const atkName=atk.linkedWith?`${CJ[atk.color]}${atk.num}+${CJ[atk.linkedWith.color]}${atk.linkedWith.num}(ATK:${a})`:`${CJ[atk.color]}${atk.num}`;
  const defName=target.linkedWith?`${CJ[target.color]}${target.num}+${CJ[target.linkedWith.color]}${target.linkedWith.num}(ATK:${d})`:`${CJ[target.color]}${target.num}`;
  toast(`バトル: ${atkName} vs ${defName}`);
  pushState();
  if(a>=d){
    // targetを破壊
    if(target.linkedWith){
      // リンク解除して持ち主が1枚選択
      breakLinkedPair(opp,target);
    }else{
      G.players[opp].field=G.players[opp].field.filter(c=>c.id!==target.id);
      sendToGrave(opp,target);
    }
  }
  if(d>=a){
    // atkを破壊
    if(atk.linkedWith){
      breakLinkedPair(p,atk);
    }else{
      G.players[p].field=G.players[p].field.filter(c=>c.id!==atk.id);
      sendToGrave(p,atk);
    }
  }
  renderAll();
  // 攻撃後に攻撃フェーズを継続（さらに攻撃できる）
  setTimeout(()=>{if(G.phase==='attack')phaseAttack();},300);
}

// リンクペアが破壊されたとき、持ち主がどちらを墓地に送るか選択
function breakLinkedPair(owner,card){
  const partner=card.linkedWith;
  // リンク解除
  card.linkedWith=null; card.linkRoot=false;
  if(partner){partner.linkedWith=null; partner.linkRoot=false; partner.speedAttacker=false;}
  card.speedAttacker=false;
  // 両方フィールドから除去
  G.players[owner].field=G.players[owner].field.filter(c=>c.id!==card.id&&c.id!==(partner?partner.id:-1));
  if(!partner){sendToGrave(owner,card);return;}
  // 選択モーダル
  showSimpleModal('リンク解除！ 墓地に送るカードを選択',[
    {label:`${CJ[card.color]}${card.num}を墓地へ`,cls:'r',fn:()=>{
      closeModal();
      sendToGrave(owner,card);
      // partnerをフィールドに残す（タップ状態で）
      partner.tapped=true;
      G.players[owner].field.push(partner);
      renderAll();
    }},
    {label:`${CJ[partner.color]}${partner.num}を墓地へ`,cls:'r',fn:()=>{
      closeModal();
      sendToGrave(owner,partner);
      card.tapped=true;
      G.players[owner].field.push(card);
      renderAll();
    }},
  ],`P${owner}はどちらを墓地に送りますか？`);
}

// ═══════════════════════════════════
//  召喚ロジック
// ═══════════════════════════════════
function getSummonCost(p,card){
  if(card.num===8)return 4;
  if(card.num===0)return 0; // 0は常にノーコスト
  let cost=card.num;
  const pl=G.players[p];
  const hasFF=pl.field.some(c=>c.linkedWith&&c.num===5&&c.linkedWith.num===5);
  const has5=pl.field.some(c=>c.num===5);
  if(hasFF)cost=Math.max(1,cost-5);
  else if(has5)cost=Math.max(1,cost-1);
  return Math.max(0,cost);
}
function availMana(p){return G.players[p].mana.filter(c=>!c.tapped).reduce((s,c)=>s+(c.num===9?2:1),0);}
function totalMana(p){return G.players[p].mana.reduce((s,c)=>s+(c.num===9?2:1),0);}
function canSummon(p,card){
  if(card.num===0)return true; // 0は常に召喚可・コスト0・マナ色不問
  const cost=getSummonCost(p,card);
  if(availMana(p)<cost)return false;
  if(card.num===8)return true;
  // 色チェック: マナゾーンに同色が1枚でも存在すればOK（タップ済み可）
  // 9がマナゾーンに存在すれば全色対応
  const has9=G.players[p].mana.some(c=>c.num===9);
  if(has9)return true;
  return G.players[p].mana.some(c=>c.color===card.color);
}

function completeSummon(p,card){
  const pl=G.players[p];
  if(card.num===8){
    const opp=p===1?2:1;
    G.players[opp].field.forEach(c=>c.tapped=true);
    pl.hand=pl.hand.filter(c=>c.id!==card.id);
    pl.graveyard.push(card);
    fxSpell(p);
    toast('呪文発動！ 相手フィールドを全タップ');
    renderAll();return;
  }
  pl.hand=pl.hand.filter(c=>c.id!==card.id);
  card.tapped=false;card.summonedThisTurn=true;
  const hasLink34=pl.field.some(c=>c.linkedWith&&((c.num===3&&c.linkedWith.num===4)||(c.num===4&&c.linkedWith.num===3)));
  if(hasLink34)card.speedAttacker=true;
  pl.field.push(card);
  fxSummon(p,card);
  pushState();
  renderAll();
  if(card.num===2){showHirabonDeclareModal(p,false,null);return;}
  if(card.num===6){show6BounceModal(p);return;}
  if(card.num===7){show7PickModal(p);return;}
  if(card.num===0){handle0OnSummon(p,card);return;}
  checkExTjia(p);
  setTimeout(()=>{if(G.phase==='summon')phaseSummon();},400);
}

// カードを元ゾーンに戻す（キャンセル用）
function restoreCard(card,op,zone){
  card._faceDown=false;
  if(zone==='hand')G.players[op].hand.push(card);
  else if(zone==='mana')G.players[op].mana.push(card);
  else if(zone==='grave')G.players[op].graveyard.push(card);
  else if(zone==='field'){card.tapped=false;G.players[op].field.push(card);}
  else if(zone==='shield'){
    // 空きシールドスロットに戻す
    const idx=G.players[op].shields.indexOf(null);
    if(idx!==-1)G.players[op].shields[idx]=card;
    else G.players[op].shields.push(card);
  }
  else if(zone==='deck')G.players[op].deck.push(card);
  renderAll();
}

function exec7Move(p,card,origOwner,dest,to){
  card.tapped=false;
  if(dest==='hand'){card._faceDown=false;G.players[to].hand.push(card);}
  else if(dest==='mana'){card._faceDown=false;G.players[to].mana.push(card);}
  else if(dest==='field'){card._faceDown=false;card.summonedThisTurn=true;G.players[to].field.push(card);}
  else if(dest==='shield'){
    // 残っているシールドの「先頭（次に破壊される位置）」に配置
    // doShieldBreakはfindIndex(s=>s!==null)で先頭のnullでないものを破壊する
    // よってindex=0から順番に埋まっているものが先に破壊される
    const shields=G.players[to].shields;
    // index=0から見て最初にnullでないスロットの「直前のnull」に配置
    // → 最もindex=0側のnullに配置すれば次に破壊される
    const firstActive=shields.findIndex(s=>s!==null);
    if(firstActive===0){
      // 既にindex=0が埋まっている → 先頭に差し込む
      shields.unshift(card);
    }else if(firstActive===-1){
      // 全部null → index=0に置く
      shields[0]=card;
    }else{
      // firstActive>0 → firstActive-1のnullに置く
      shields[firstActive-1]=card;
    }
  }
  else if(dest==='deck'){G.players[to].deck.push(card);}
  else{card._faceDown=false;sendToGrave(origOwner,card);}
  fxEffect(p,'カード移動！');
  renderAll();
  G._7selectMode=null;
  if(dest==='field'){
    card._faceDown=false;
    // フィールドに出たカードの効果発動
    if(card.num===7){setTimeout(()=>show7PickModal(p),300);return;}
    if(card.num===2){showHirabonDeclareModal(p,false,null);return;}
    if(card.num===6){show6BounceModal(p);return;}
  }
  checkExTjia(p);
  setTimeout(()=>{if(G.phase==='summon')phaseSummon();},400);
}

function handle0OnSummon(p,card){
  const pl=G.players[p];
  const hasFF=pl.field.some(c=>c.linkedWith&&c.num===5&&c.linkedWith.num===5&&c.id!==card.id);
  const has5=pl.field.some(c=>c.num===5&&c.id!==card.id);
  if(!pl.graveyard.length||(!has5&&!hasFF)){checkExTjia(p);setTimeout(()=>{if(G.phase==='summon')phaseSummon();},400);return;}
  pick5Grave(p,hasFF?5:1);

  const field=G.players[p].field.filter(c=>!c.linkedWith);
  const pairs=[];
  for(let i=0;i<field.length;i++)for(let j=i+1;j<field.length;j++)if(validLink(field[i],field[j]))pairs.push([field[i],field[j]]);
  if(!pairs.length){toast('リンク可能なペアがありません');return;}
  showSimpleModal('リンク — ペアを選択',[
    ...pairs.map(([a,b])=>({label:`${CJ[a.color]}${a.num}+${CJ[b.color]}${b.num}`,cls:'b',fn:()=>{closeModal();doLink(a,b,p);}})),
    {label:'キャンセル',cls:'n',fn:closeModal},
  ],'リンクするペアを選んでください');
}
function validLink(a,b){
  if(a.color===b.color&&((a.num===3&&b.num===4)||(a.num===4&&b.num===3)))return true;
  return a.num===5&&b.num===5;
}
function doLink(a,b,p){
  a.linkedWith=b;b.linkedWith=a;
  // 小さい番号側をrootとして攻撃/タップを代表させる
  if(a.num<=b.num){a.linkRoot=true;b.linkRoot=false;}
  else{b.linkRoot=true;a.linkRoot=false;}
  if((a.num===3&&b.num===4)||(a.num===4&&b.num===3)){
    G.players[p].field.forEach(c=>c.speedAttacker=true);
    fxEffect(p,'リンク3+4！ スピードアタッカー！');
  }else{
    fxEffect(p,'リンク5+5！');
  }
  renderAll();
  setTimeout(()=>{if(G.phase==='summon')phaseSummon();},400);
}

// ─ シールドブレイク ─
function breakShield(targetP,sc){
  const attP=targetP===1?2:1;
  if(ONLINE.enabled){
    // オンライン: 防御側(targetP)のスマホかどうかで分岐
    const iAmDefender=(parseInt(ONLINE.myPlayer)===targetP);

      }else{

        // 防御側がST処理後にpushStateする → subscribeで受信して攻撃フェーズ継続
        setBar('相手がシールドを確認中...',[]);

    }else{
      if(sc._faceDown)sc._faceDown=false; // 裏向きフラグをリセット

        showSimpleModal('シールド確認',[
          {label:'OK',cls:'g',fn:()=>{

            renderAll();
          }},

      }else{

        setBar('相手がシールドを確認中...',[]);
      }

        {label:'OK',cls:'g',fn:()=>{closeModal();if(G.phase==='attack')setTimeout(phaseAttack,200);}},
      ],'シールドが手札に加わりました',targetP);
    }
  }
}
function checkDirect(targetP,attP){

// ── オンラインフェーズハンドラ ──
function handleOnlinePhase(phase, myP){
  console.log('[handleOnlinePhase]',phase,'myP='+myP,'_pendingAtk=',JSON.stringify(G._pendingAtk));
  if(phase==='block-query'){
    const atk=G._pendingAtk;
    const p=atk?parseInt(atk.attPlayer):null;
    const opp=p===1?2:1;
    console.log('[block-query] attP='+p+' opp='+opp+' myP='+myP+' iAmDef='+(myP===opp));
    if(myP===opp){
      // 防御側: ブロック確認モーダルを表示

      const atkCard=G.players[p]&&G.players[p].field.find(c=>c.id==atk.atkId);
      const blockers=G.players[opp].field.filter(c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot));

            closeModal();

              (blocker)=>{

                // ブロック先をGに記録してpush
                G.onlinePhase='block-resolve';
                G._blockerId=blocker.id;

                renderAll();
              },
              [{label:'ブロックしない',cls:'r',fn:()=>{
                closeModal();
                G.onlinePhase='shield-break';
                G._blockerId=null;
                pushState();
                renderAll();
              }}],opp
            );
          }},
          {label:'ブロックしない',cls:'r',fn:()=>{
            closeModal();

            if(pendingAtk&&pendingAtk.isDirect){
              // ダイレクトアタック: ブロックなし確定 → block-resolveで攻撃側が処理

              G._blockerId=null;

              renderAll();

              G.onlinePhase='shield-break';
              G._blockerId=null;
              pushState();
              renderAll();

      }else{

        const atk=G._pendingAtk;

          G.onlinePhase='direct-attack';
          G._blockerId=null;
          pushState();
          renderAll();

          G.onlinePhase='shield-break';

          pushState();
          renderAll();
        }
      }
    }else{
      setBar('相手がブロックを検討中...',[]);
    }
  }
  else if(phase==='block-resolve'){
    const atk=G._pendingAtk;
    const p=atk?parseInt(atk.attPlayer):null;
    const opp=p===1?2:1;
    if(myP===p){
      const atkCard=G.players[p].field.find(c=>c.id==atk.atkId);
      const blocker=G._blockerId!=null?G.players[opp].field.find(c=>c.id==G._blockerId):null;
      if(atkCard&&blocker){
        // ブロッカーあり: バトル解決
        G.onlinePhase=null;G._pendingAtk=null;G._blockerId=null;
        execCreatureAttack(atkCard,blocker,p);
      }else if(atk.isDirect){
        // ダイレクト: ブロッカーなし → ダイレクトアタック確定
        G.onlinePhase='direct-attack';
        G._blockerId=null;
        pushState();
        fxDirectAttack(p);
        setTimeout(()=>winGame(p,'ダイレクトアタック！'),1400);
      }else{
        // 通常シールド攻撃でブロックなし → shield-breakへ
        G.onlinePhase='shield-break';
        G._blockerId=null;
        pushState();
        renderAll();
      }
    }else{
      setBar('相手が処理中...',[]);
    }
  }
  else if(phase==='direct-attack'){
    // 攻撃側: ダイレクトアタック確定
    const atk=G._pendingAtk;
    const p=atk?parseInt(atk.attPlayer):null;
    if(myP===p){
      G.onlinePhase=null;G._pendingAtk=null;
      const atkCard=G.players[p].field.find(c=>c.id==atk.atkId);
      fxDirectAttack(p);
      setTimeout(()=>winGame(p,'ダイレクトアタック！'),1400);
    }else{
      setBar('ダイレクトアタック！',[]);
    }
  }
  else if(phase==='shield-break'){
    // 攻撃側: シールド実際に割る
    const atk=G._pendingAtk;
    const p=atk?parseInt(atk.attPlayer):null;
    const opp=p===1?2:1;
    if(myP===p){
      const atkCard=G.players[p].field.find(c=>c.id==atk.atkId);
      if(atkCard){
        G.onlinePhase='shield-confirm';
        doShieldBreakOnline(atkCard,p);
      }
    }else{
      setBar('シールドが割られました...',[]);
    }
  }
  else if(phase==='shield-confirm'){
    // 防御側: シールド確認
    const atk=G._pendingAtk;
    const p=atk?parseInt(atk.attPlayer):null;
    const opp=p===1?2:1;
    if(myP===opp){
      // STの処理
      if(G.pendingST&&G.pendingST.length){

        showSimpleModal('シールド確認',[
          {label:'OK',cls:'g',fn:()=>{
            closeModal();

            G._pendingAtk=null;
            pushState();
            renderAll();
          }},
        ],'シールドが手札に加わりました',opp);

      setBar('相手がシールドを確認中...',[]);
    }
  }
  else if(phase==='attack-continue'){
    // 攻撃側: 攻撃継続
    const p=G.turn;
    if(myP===p){
      G.onlinePhase=null;G._pendingAtk=null;
      pushState();
      setTimeout(phaseAttack,200);
    }else{
      setBar('相手が攻撃継続中...',[]);
    }
  }
}

// オンライン: シールドを実際に割ってGを更新してpush
function doShieldBreakOnline(atk,p){
  p=parseInt(p);
  const opp=p===1?2:1;
  const oppPl=G.players[opp];

  // シールドがなければダイレクト
  if(oppPl.shields.filter(Boolean).length===0){
    G.onlinePhase=null;G._pendingAtk=null;
    atk.tapped=true;
    if(atk.linkedWith)atk.linkedWith.tapped=true;
    pushState();
    winGame(p,'ダイレクトアタック！');
    return;
  }

  // ブレイカー数
  const isTriple=(atk.num===0);
  const isDouble=(atk.num===7||atk.num===9||
    (atk.linkedWith&&(atk.num===5||atk.linkedWith.num===5)));

  atk.tapped=true;
  if(atk.linkedWith)atk.linkedWith.tapped=true;

  // シールドをキューに積む
  const toBreak=[];
  if(isTriple){
    // 1枚目は直接墓地用フラグ、残り2枚まで
    const first=oppPl.shields.findIndex(s=>s!==null);
    if(first!==-1){
      const sc=oppPl.shields[first];
      oppPl.shields[first]=null;
      sendToGrave(opp,sc); // 1枚目は直接墓地
      fxShieldBreak(opp,true);
    }
    // 2枚目・3枚目
    for(let i=0;i<2;i++){
      const idx=oppPl.shields.findIndex(s=>s!==null);
      if(idx!==-1){toBreak.push(oppPl.shields[idx]);oppPl.shields[idx]=null;}
    }
  }else if(isDouble){
    for(let i=0;i<2;i++){
      const idx=oppPl.shields.findIndex(s=>s!==null);
      if(idx!==-1){toBreak.push(oppPl.shields[idx]);oppPl.shields[idx]=null;}
    }
    if(toBreak.length>0)fxShieldBreak(opp,false);
  }else{
    const idx=oppPl.shields.findIndex(s=>s!==null);
    if(idx!==-1){toBreak.push(oppPl.shields[idx]);oppPl.shields[idx]=null;}
    if(toBreak.length>0)fxShieldBreak(opp,false);
  }

  // 破壊したシールドを処理（ST・手札）
  G.pendingST=[];
  for(const sc of toBreak){
    if(sc._faceDown)sc._faceDown=false;
    if(sc.num===6||sc.num===8){
      G.pendingST.push({player:opp,card:sc});
    }else{
      G.players[opp].hand.push(sc);
    }
  }

  G.onlinePhase='shield-confirm';
  pushState();
  renderAll();
}
function processST(){
  if(!G.pendingST.length)return;
  const st=G.pendingST[0];
  showSimpleModal(`シールドトリガー！`,[
    {label:'発動する！',cls:'g',fn:()=>{
      closeModal();
      activateST(st);G.pendingST.shift();
      if(G.pendingST.length){
        setTimeout(processST,300);
      }else{
        if(ONLINE.enabled){
          G.onlinePhase='attack-continue';G._pendingAtk=null;
          pushState();renderAll();
        }else{
          if(G.phase==='attack')setTimeout(phaseAttack,300);
        }
      }
    }},
    {label:'手札へ',cls:'n',fn:()=>{
      closeModal();
      G.players[st.player].hand.push(st.card);
      G.pendingST.shift();
      if(G.pendingST.length){
        setTimeout(processST,300);
      }else{
        if(ONLINE.enabled){
          G.onlinePhase='attack-continue';G._pendingAtk=null;
          pushState();renderAll();
        }else{
          renderAll();if(G.phase==='attack')setTimeout(phaseAttack,300);
        }
      }
    }},
  ],`シールドトリガーを持っています（${CJ[st.card.color]}${st.card.num}）`,st.player);
}
function activateST(st){
  const pl=G.players[st.player];
  if(st.card.num===8){
    const opp=st.player===1?2:1;
    G.players[opp].field.forEach(c=>c.tapped=true);
    pl.graveyard.push(st.card);
    fxSpell(st.player);
    toast(`ST呪文！ P${opp}フィールドを全タップ`);
    renderAll();
    // オンライン: 8の効果（全タップ）を攻撃側に反映
    if(ONLINE.enabled){pushState();}
    return;
  }
  st.card.tapped=false;st.card.summonedThisTurn=false;
  pl.field.push(st.card);
  fxSummon(st.player,st.card);
  toast(`ST発動！ ${CJ[st.card.color]}${st.card.num}が場に`);
  renderAll();
  if(st.card.num===2){showHirabonDeclareModal(st.player,false,null);return;}
  if(st.card.num===6){
    // 6の効果後にpushして攻撃側に反映してからバウンス選択
    show6BounceModal(st.player);
    return;
  }
  if(st.card.num===7){show7PickModal(st.player);return;}
  if(st.card.num===0){handle0OnSummon(st.player,st.card);return;}
  // その他: pushStateして攻撃側に反映
  if(ONLINE.enabled){pushState();}
}

// ─ ユーティリティ ─
function canAttack(p,card){
  // リンクのサブカード（linkRootでない側）は個別攻撃不可
  if(card.linkedWith&&!card.linkRoot)return false;
  return!card.tapped&&(!card.summonedThisTurn||card.speedAttacker);
}
// カードの攻撃力を返す（表示には使わず処理のみ）
function getAtkPower(card){
  if(card.linkedWith&&card.linkRoot){
    if(card.num===3||card.num===4)return 3.5;
    if(card.num===5)return 5;
  }
  // 0の攻撃力: 青=11, 緑=12, 黄=13, 赤=14
  if(card.num===0){
    const pow0={blue:11,green:12,yellow:13,red:14};
    return pow0[card.color]||11;
  }
  return card.num;
}
function destroyByNum(p,num){
  const pl=G.players[p];
  pl.field.filter(c=>c.num===num).forEach(c=>{pl.field=pl.field.filter(x=>x.id!==c.id);sendToGrave(p,c);});
  pl.mana.filter(c=>c.num===num).forEach(c=>{pl.mana=pl.mana.filter(x=>x.id!==c.id);pl.graveyard.push(c);});
}
function sendToGrave(p,card){
  if(card.num===4){card.tapped=false;G.players[p].mana.push(card);toast(`${CJ[card.color]}4の効果: マナへ`);}
  else G.players[p].graveyard.push(card);
  if(card.linkedWith){
    card.linkedWith.linkedWith=null;
    card.linkedWith.speedAttacker=false;
    card.linkedWith.linkRoot=false;
    card.linkedWith=null;
  }
  card.linkRoot=false;
}
// エクTジア条件チェック: 手札+フィールドに0のカードが4色（赤・青・緑・黄）全部揃う
function hasExTjia(p){
  if(G.gameOver)return false;
  const all=[...G.players[p].hand,...G.players[p].field];
  const zeros=all.filter(c=>c.num===0);
  const zeroColors=new Set(zeros.map(c=>c.color));
  return zeroColors.size>=4; // 赤0・青0・緑0・黄0 全部揃い
}
// checkExTjia は呼び出しても何もしない（宣言ボタンで対応するため）
function checkExTjia(p){ /* 自動発動なし - 召喚フェーズで宣言ボタンを使用 */ }

function declareExTjia(p){
  if(!hasExTjia(p)){toast('エクTジアの条件が揃っていません');return;}
  fxExTjia(p);
  setTimeout(()=>{
    showSimpleModal('エクTジア宣言！',[
      {label:'勝利宣言！',cls:'g',fn:()=>{closeModal();winGame(p,'エクTジア！（0＋4色）');}},
      {label:'やっぱりやめる',cls:'n',fn:()=>{closeModal();phaseSummon();}},
    ],'手札+場に赤0・青0・緑0・黄0が揃っています！',p);
  },1300);
}
function winGame(p,reason){
  if(G.gameOver)return; // 重複防止
  G.gameOver=true;
  G._winner=p;
  G._winReason=reason;
  pushState();
  document.getElementById('win-title').textContent=`🎉 P${p} の勝利！`;
  document.getElementById('win-sub').textContent=reason;
  document.getElementById('win-screen').classList.add('show');
}

const FX=document.getElementById('fx-layer');
function clearFx(){FX.innerHTML='';}

function fxParticles(x,y,color,count=12,big=false){
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.className='fx-particle';
    const ang=Math.random()*360,dist=big?(60+Math.random()*80):(30+Math.random()*50);
    const dx=Math.cos(ang*Math.PI/180)*dist,dy=Math.sin(ang*Math.PI/180)*dist;
    const sz=big?(8+Math.random()*12):(4+Math.random()*8);
    el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${color};--dx:${dx}px;--dy:${dy}px;animation-duration:${0.4+Math.random()*0.4}s;animation-delay:${Math.random()*0.1}s;`;
    FX.appendChild(el);
    setTimeout(()=>el.remove(),900);
  }
}

function fxWord(text,color='#fbbf24',size=32){
  const el=document.createElement('div');
  el.className='fx-word';
  el.style.cssText=`font-size:${size}px;color:${color};text-shadow:0 0 20px ${color};`;
  el.textContent=text;
  FX.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function fxFlash(color){
  const el=document.createElement('div');
  el.className='fx-flash';
  el.style.background=color;
  FX.appendChild(el);
  setTimeout(()=>el.remove(),400);
}

function fxRing(x,y,color){
  const el=document.createElement('div');
  el.className='fx-slam';
  el.style.cssText=`left:${x-30}px;top:${y-30}px;width:60px;height:60px;color:${color};`;
  FX.appendChild(el);
  setTimeout(()=>el.remove(),600);
}

// 召喚
function fxSummon(p,card){
  const col=COL_HEX[card.color];
  const cx=window.innerWidth/2,cy=window.innerHeight*(p===1?0.65:0.35);
  if(card.num===0){
    // 0は派手に
    fxFlash('rgba(251,191,36,0.4)');

function renderAll(){
  for(const p of [1,2]){renderHand(p);renderField(p);renderMana(p);renderShields(p);renderDeckGrave(p);}
  updateStats();
}

function cardHTML(card,zone,p){
  const cls=['card',card.color];
  if(card.tapped)cls.push('tapped');
  if(card.linkedWith)cls.push('linked');
  // 選択中ハイライト
  if(G.selCard&&G.selCard.id===card.id)cls.push('sel-atk');
  let click='';
  const isMyTurn=ONLINE.enabled?(G.turn===ONLINE.myPlayer):true;
  if(zone==='hand'&&p===G.turn&&isMyTurn){
    if(G.phase==='charge')click=`onclick="(function(){var c=G.players[${p}].hand.find(c=>c.id==${card.id});if(c)selectHandForCharge(c);})()"`;
    else if(G.phase==='summon')click=`onclick="(function(){var c=G.players[${p}].hand.find(c=>c.id==${card.id});if(c)selectHandForSummon(c);})()"`;
  }
  if(zone==='field'&&p===G.turn&&G.phase==='attack'&&isMyTurn){
    click=`onclick="(function(){var c=G.players[${p}].field.find(c=>c.id==${card.id});if(c)selectFieldForAttack(c,${p});})()"`;
  }
  if(zone==='field'&&G._7selectMode&&G._7selectMode.active){
    click=`onclick="on7FieldTap(${card.id},${p})"`;
  }
  return `<div class="${cls.join(' ')}" ${click}
    oncontextmenu="showCinfo(event,${card.id});return false;">
    <div class="uno-oval"></div>
    <span class="cn-tl">${card.num}</span>
    <div class="cn">${card.num}</div>
    <span class="cn-br">${card.num}</span>
  </div>`;
}

function renderHand(p){
  const el=document.getElementById(`p${p}-hand`);
  let showFront;
  if(ONLINE.enabled){
    showFront=(p===ONLINE.myPlayer); // 自分の手札のみ表向き（常に）
  }else{
    showFront=(p===G.turn); // ローカル: 現在ターンのプレイヤーが表向き
  }
  el.innerHTML=showFront
    ?G.players[p].hand.map(c=>cardHTML(c,'hand',p)).join('')
    :G.players[p].hand.map(()=>`<div class="card card-back"><div class="uno-oval" style="background:rgba(255,255,255,.25)"></div><div class="cn" style="font-size:14px">T</div></div>`).join('');
}
function renderField(p){
  // リンクのサブカード（linkRoot=false&&linkedWithあり）はルートと一緒に描画
  const cards=G.players[p].field;
  let html='';
  const rendered=new Set();
  cards.forEach(c=>{
    if(rendered.has(c.id))return;
    if(c.linkedWith&&!c.linkRoot){rendered.add(c.id);return;} // subはスキップ
    if(c.linkedWith&&c.linkRoot){
      // ペア描画：2枚重ねラッパー
      rendered.add(c.id);rendered.add(c.linkedWith.id);
      html+=linkedPairHTML(c,c.linkedWith,p);
    }else{
      rendered.add(c.id);
      html+=cardHTML(c,'field',p);
    }
  });
  document.getElementById(`p${p}-field`).innerHTML=html;
}

function linkedPairHTML(root,sub,p){
  const cls=['card',root.color];
  if(root.tapped)cls.push('tapped');
  cls.push('linked');
  if(G.selCard&&G.selCard.id===root.id)cls.push('sel-atk');
  let click='';
  if(p===G.turn&&G.phase==='attack'){
    click=`onclick="selectFieldForAttack(G.players[${p}].field.find(c=>c.id===${root.id}),${p})"`;
  }else if(G._7selectMode&&G._7selectMode.active){
    click=`onclick="on7FieldTap(${root.id},${p})"`;
  }
  const pow=getAtkPower(root);
  return `<div style="position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:1px">
    <div class="${cls.join(' ')}" ${click}
      oncontextmenu="showCinfo(event,${root.id});return false;"
      style="position:relative;">
      <div class="uno-oval"></div>
      <span class="cn-tl">${root.num}</span>
      <div class="cn">${root.num}</div>
      <span class="cn-br">${root.num}</span>
      <div style="position:absolute;bottom:1px;right:2px;font-size:6px;color:rgba(255,255,255,.85);z-index:2;text-shadow:none;">LINK</div>
    </div>
    <div style="font-size:7px;color:#fbbf24;font-weight:700;line-height:1">+${sub.num}</div>
  </div>`;
}
function renderMana(p){
  document.getElementById(`p${p}-mana`).innerHTML=
    G.players[p].mana.map(c=>{
      const cls=['mc',c.color];if(c.tapped)cls.push('tapped');
      return `<div class="${cls.join(' ')}">${c.num}</div>`;
    }).join('');
}
function renderShields(p){
  const el=document.getElementById(`p${p}-shields`);el.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='sc';
    d.textContent=G.players[p].shields[i]?'🛡':'✕';
    if(!G.players[p].shields[i])d.classList.add('broken');
    el.appendChild(d);
  }
}
function renderDeckGrave(p){
  const pl=G.players[p];
  document.getElementById(`p${p}-dc`).textContent=pl.deck.length;
  const ge=document.getElementById(`p${p}-grave`);
  ge.innerHTML=`<span id="p${p}-gc">${pl.graveyard.length}</span>`;
  if(pl.graveyard.length){const top=pl.graveyard[pl.graveyard.length-1];ge.innerHTML+=`<div class="tc ${top.color}">${top.num}</div>`;}
}
function updateStats(){
  for(const p of [1,2]){
    const pl=G.players[p];
    const tot=pl.mana.reduce((s,c)=>s+(c.num===9?2:1),0);
    const av=pl.mana.filter(c=>!c.tapped).reduce((s,c)=>s+(c.num===9?2:1),0);
    document.getElementById(`p${p}-hc`).textContent=`手札${pl.hand.length}`;
    document.getElementById(`p${p}-mc`).textContent=`マナ${av}/${tot}`;
    document.getElementById(`p${p}-sc`).textContent=`🛡${pl.shields.filter(Boolean).length}`;
    document.getElementById(`p${p}-dot`).className='tdot'+(G.turn===p?'':' off');
  }
}

let _scpForPlayer=null;
function showCardPicker(title,subtitle,cards,owner,isMana,onSelect,extraBtns=[],forPlayer=null){
  _scpForPlayer=forPlayer;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-subtitle').textContent=subtitle;
  const listEl=document.getElementById('modal-list');listEl.innerHTML='';
  let sel=null;
  function renderRows(){
    listEl.innerHTML='';
    cards.forEach(card=>{
      const row=document.createElement('div');
      row.className='mi'+(sel&&sel.id===card.id?' sel':'');
      const cost=(!isMana&&G.phase==='summon')?getSummonCost(owner,card):null;
      const ok=cost!==null?canSummon(owner,card):null;
      const ct=cost!==null?(ok?'✔ コスト'+cost:'✖ コスト'+cost+'/マナ'+availMana(owner)):'';
      row.innerHTML=`<div class="mcard ${card.color}${card.tapped?' tapped':''}">${card.num}</div><div style="flex:1;min-width:0"><div class="iname">${CJ[card.color]}${card.num} ${ICON[card.num]||''}</div><div class="idesc">${ct?ct+'　':''}${EFF[card.num]||''}</div></div>`;
      if(onSelect)row.addEventListener('click',()=>{sel=card;renderRows();renderBtns();});
      listEl.appendChild(row);
    });
  }
  const btnsEl=document.getElementById('modal-btns');
  function renderBtns(){
    btnsEl.innerHTML='';
    if(onSelect&&sel){const ab=document.createElement('button');ab.className='btn g';ab.textContent='決定';ab.onclick=()=>onSelect(sel);btnsEl.appendChild(ab);}
    extraBtns.forEach(b=>{const el=document.createElement('button');el.className='btn '+b.cls;el.textContent=b.label;el.onclick=b.fn;btnsEl.appendChild(el);});
  }
  renderRows();renderBtns();
  const ov=document.getElementById('modal-overlay');
  ov.classList.add('show');
  applyModalDir(_scpForPlayer||G.turn);
  _scpForPlayer=null;
}

function showCinfo(e,id){
  e.preventDefault();
  const card=findById(id);if(!card)return;
  document.getElementById('cinfo-title').textContent=CJ[card.color]+'の'+card.num;

function findById(id){
  for(const p of [1,2]){const pl=G.players[p];for(const arr of [pl.hand,pl.field,pl.mana,pl.graveyard,pl.shields]){const c=arr&&arr.find(x=>x&&x.id===id);if(c)return c;}}
  return null;
}

// ─ レイアウト ─
function adjustLayout(){
  requestAnimationFrame(()=>{
    const bar=document.getElementById('action-bar');if(!bar)return;
    const h=bar.offsetHeight;
    document.documentElement.style.setProperty('--bar-h',h+'px');
    const ha1=document.querySelector('#p1-area .hand-area');
    const ha2=document.getElementById('p2-hand-area');
    // 初期化
    if(ha1){ha1.style.paddingBottom='4px';}
    if(ha2){ha2.style.paddingTop='4px';ha2.style.paddingBottom='4px';}
    if(ONLINE.enabled){
      if(parseInt(ONLINE.myPlayer)===2){
        bar.classList.add('top-mode');
        if(ha2)ha2.style.paddingTop=(h+4)+'px'; // バーが上なのでP2手札の上に余白
      }else{
        bar.classList.remove('top-mode');
        if(ha1)ha1.style.paddingBottom=(h+4)+'px'; // バーが下なのでP1手札の下に余白
      }
    }else{
      // ローカル: 常にバーは下。現在ターンのプレイヤーの手札下に余白
      bar.classList.remove('top-mode');
      if(ha1)ha1.style.paddingBottom=(h+4)+'px';
      if(ha2)ha2.style.paddingBottom=(h+4)+'px';
    }
  });
}
window.addEventListener('resize',adjustLayout);
setTimeout(adjustLayout,80);setTimeout(adjustLayout,400);

function retryGame(){
  if(ONLINE.enabled&&ONLINE.roomId){
    remove(ref(db,`rooms/${ONLINE.roomId}`)).finally(()=>location.reload());
  }else{
    location.reload();
  }
}
// フリーズ対策: モーダルを閉じてターン状態をリセット
function emergencyReset(){
  closeModal();
  G.selCard=null;G.selMana=[];G.atkCard=null;G._7selectMode=null;G.pendingST=[];
  if(G.phase==='setup'){showTitleScreen();return;}
  if(ONLINE.enabled&&G.turn!==ONLINE.myPlayer){
    setBar(`P${G.turn}のターン — 相手の番です`,[]);
  }else{
    // 現在のフェーズを再開
    if(G.phase==='charge')phaseCharge();
    else if(G.phase==='summon')phaseSummon();
    else if(G.phase==='attack')phaseAttack();
    else if(G.phase==='untap'||G.phase==='draw')phaseUntap();
    else phaseCharge();
  }
  renderAll();
}

function showTitleScreen(){
  document.getElementById('phase-label').textContent='Tジマ';
  document.getElementById('action-buttons').innerHTML=`
    <button class="btn p" onclick="startOffline()">ローカル対戦</button>
    <button class="btn b" onclick="showOnlineMenu()">オンライン対戦</button>
  `;
}

function startOffline(){
  ONLINE.enabled=false;
  startGame();
}

function showOnlineMenu(){
  showSimpleModal('オンライン対戦',[
    {label:'ルームを作成（先攻）',cls:'g',fn:()=>{closeModal();createRoom();}},
    {label:'ルームに参加（後攻）',cls:'b',fn:()=>{closeModal();joinRoomPrompt();}},
    {label:'戻る',cls:'n',fn:closeModal},
  ],'どちらですか？');
}

function generateRoomId(){
  return Math.random().toString(36).slice(2,7).toUpperCase();
}

async function createRoom(){
  if(!db){await window._fbReady;}
  const roomId=generateRoomId();
  ONLINE.enabled=true;
  ONLINE.roomId=roomId;
  ONLINE.myPlayer=1;
  await set(ref(db,`rooms/${roomId}/host`),'waiting');
  showSimpleModal(`ルームID: ${roomId}`,[
    {label:'キャンセル',cls:'r',fn:()=>{
      closeModal();
      remove(ref(db,`rooms/${roomId}`));
      ONLINE.enabled=false;ONLINE.roomId=null;ONLINE.myPlayer=null;
      showTitleScreen();
    }},
  ],`このIDを相手に教えてください
相手が参加するまでお待ちください...`);
  document.getElementById('modal-title').textContent=`ルームID: ${roomId}`;
  // 相手が参加するのを待つ
  const guestRef=ref(db,`rooms/${roomId}/guest`);
  let unsub2;
  unsub2=onValue(guestRef,snap=>{
    if(snap.val()==='joined'){
      unsub2();
      closeModal();
      toast('相手が参加しました！ゲーム開始！');
      initGame();
      // P2がsubscribeした後にpushするので少し待つ
      setTimeout(()=>{ pushState(); }, 500);
      subscribeRoom(roomId);
      renderAll();
      phaseUntap();
    }
  });
}

function joinRoomPrompt(){
  // シンプルなプロンプト
  const box=document.getElementById('modal-box');
  document.getElementById('modal-title').textContent='ルームIDを入力';
  document.getElementById('modal-subtitle').textContent='相手から教えてもらったIDを入力してください';
  document.getElementById('modal-list').innerHTML=`
    <input id="room-input" type="text" placeholder="例: AB3XY"
      style="width:100%;padding:12px;border-radius:10px;border:2px solid #4a2d8a;
      background:#0e1225;color:#fff;font-size:20px;font-family:'Fredoka One',cursive;
      text-align:center;letter-spacing:4px;text-transform:uppercase;margin:8px 0;"
      maxlength="5" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
  `;
  document.getElementById('modal-btns').innerHTML='';
  const joinBtn=document.createElement('button');
  joinBtn.className='btn g';joinBtn.textContent='参加する';
  joinBtn.onclick=async()=>{
    const raw=document.getElementById('room-input').value;
    const id=raw.replace(/[^a-zA-Z0-9]/g,'').toUpperCase().slice(0,5);
    if(id.length<3){toast('IDを入力してください');return;}
    await joinRoom(id);
  };
  const cancelBtn=document.createElement('button');
  cancelBtn.className='btn n';cancelBtn.textContent='キャンセル';
  cancelBtn.onclick=()=>{closeModal();showTitleScreen();};
  document.getElementById('modal-btns').appendChild(joinBtn);
  document.getElementById('modal-btns').appendChild(cancelBtn);
  document.getElementById('modal-overlay').classList.add('show');
}

async function joinRoom(roomId){
  if(!db){await window._fbReady;}
  const hostSnap=await get(ref(db,`rooms/${roomId}/host`));
  if(!hostSnap.exists()){toast('ルームが見つかりません');return;}
  ONLINE.enabled=true;
  ONLINE.roomId=roomId;
  ONLINE.myPlayer=2;
  await set(ref(db,`rooms/${roomId}/guest`),'joined');
  closeModal();
  toast('参加しました！ゲーム開始まで少々お待ちください...');
  subscribeRoom(roomId);
}
