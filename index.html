<!-- ═══════════════════════════════════════════════════════════════════
     CPU 対戦モジュール（思考ルーチン + 統合ループ + モーダル自動化）
     既存スクリプトの後に読み込むこと。G などのグローバルを共有する。
═══════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ════════════════ 1. CPU 状態 ════════════════ */
const CPU = { enabled:false, player:2, _plan:null, _7plan:null, busy:false, _busy:false, revealHand:false, tokuda:false, _hirabonAttackDone:false, _exTjiaDeclaring:false };
function isCpu(p){ return CPU.enabled && !ONLINE.enabled && Number(p)===Number(CPU.player); }

/* ════════════════ 2. スコアリング用の重み ════════════════ */
const CPU_W = {
    "body": 0.79,
    "breaker": 3.71,
    "aggro": 4.1,
    "removal": 0.95,
    "blocker": 3.09,
    "defenseNeed": 2.37,
    "link": 5.94,
    "costEff": 0.24,
    "freeBonus": 2.4,
    "extjia": 4.9,
    "manaHit": 0.37,
    "sevenChain": 4.06,
    "mana4": 1.83,
    "atkShield": 3.01,
    "atkAggro": 3.47,
    "stRisk": 0.99,
    "defShield": 2.87,
    "bigNum": 0.54,
    "exTjiaDeny": 2.72,
    "zeroStackRisk": 10.91,
    "takeSingle": 0.95,
    "tripleBlock": 0.58,  // 大きい数字（強いカード）を召喚で優先する加点
  // ── 追加調整パラメータ（シミュレータで学習可能）──────────────────────
  exTjiaDeny:3.0,   // 2のヒラボンで相手0を割るときのエクTジア妨害価値（1枚/1色あたり）
  zeroStackRisk:13, // 0を場に並べたとき2で一掃されるリスク減点の係数
  takeSingle:1.0,   // シングルブレイカー攻撃を「受け得」と見て消極ブロックする度合い（0で常時ブロック）
  tripleBlock:0.7,  // 0(トリプル)の攻撃を受けると1枚墓地送りになる損失のブロック加点係数
};

/* ════════════════ 3. 盤面評価・共通ヘルパー ════════════════ */
function cpuEvalBoard(p){
  const opp=(p===1)?2:1, me=G.players[p], en=G.players[opp];
  const enUnits=en.field.filter(c=>!c.linkedWith||c.linkRoot);
  const oppUntappedBlockers=enUnits.filter(c=>(c.num===1||c.num===3)&&!c.tapped);
  const oppBiggest=enUnits.reduce((m,c)=>Math.max(m,getAtkPower(c)),0);
  const myShields=me.shields.filter(Boolean).length;
  const oppShields=en.shields.filter(Boolean).length;
  const aggro=Math.min(1,(5-oppShields)/5+(oppShields===0?0.3:0));
  const enemyThreatens=enUnits.length>0;
  const defenseNeed=((5-myShields)/5)*(enemyThreatens?1:0.3);
  // ── 危険度指標（次ターンに殴られたときの生存余力）─────────────────────
  // ポイント: ブロッカーは「相手クリーチャー1体の攻撃」を止める（ブレイク数は無関係）。
  //   0(トリプルブレイカー)でもブロッカー1体で攻撃自体は防げる。
  //   よって「相手の攻撃可能クリーチャー数」と「自分のブロッカー数」で止め合い、
  //   止めきれなかった攻撃のブレイク合計だけシールドが削られる、と計算する。
  const oppAttackers=enUnits.slice().sort((a,b)=>cpuBreakerCount(b)-cpuBreakerCount(a)); // 大ブレイク順
  let myBlockerCount=me.field.filter(c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot)).length;
  // 相手の2(ヒラボン)脅威：同番号で並ぶブロッカーがまとめて破壊される恐れ。
  // 確率(cpuHirabonThreatProb)で期待損失を見積もり、その分だけブロッカーを割り引く。
  const iCanKill2=me.hand.some(c=>(c.num===2&&canSummon(p,c))||(c.num===6&&canSummon(p,c))||(c.num===7&&canSummon(p,c)));
  if(!iCanKill2){
    const hp=cpuHirabonThreatProb(p);          // 0〜0.95
    if(hp>0.1){
      const n1=me.field.filter(c=>c.num===1&&!c.tapped&&(!c.linkedWith||c.linkRoot)).length;
      const n3=me.field.filter(c=>c.num===3&&!c.tapped&&(!c.linkedWith||c.linkRoot)).length;
      const atRisk=Math.max(n1,n3);             // 同番号でまとめて飛ぶ最大枚数
      // 確率で割り引く（例: 2が手札に有るかも=0.4 で 2枚並ぶなら 0.8体ぶん割引）
      myBlockerCount=Math.max(0, myBlockerCount - atRisk*hp);
    }
  }
  // ブロッカーで止められない攻撃のブレイク合計＝シールドが削られる量
  // ブロッカーは「最も脅威の大きい攻撃(=ブレイク数の多い0や9)」から優先的に止めると仮定
  // ヒラボン割引後の端数は切り捨て（確実に止められる数だけカウント）
  let blockersLeft=Math.floor(myBlockerCount), shieldDamage=0;
  for(const atk of oppAttackers){
    if(blockersLeft>0){ blockersLeft--; }       // この攻撃はブロッカーで止める（シールド無傷）
    else { shieldDamage+=cpuBreakerCount(atk); } // 止めきれない→ブレイク数だけシールドが減る
  }
  // dangerLevel = 次ターン攻撃を受けた後に残るシールド枚数（マイナス=シールドが割り切られる=敗北圏）
  const dangerLevel=myShields-shieldDamage;
  const oppBreakerTotal=enUnits.reduce((s,c)=>s+cpuBreakerCount(c),0); // 参考値として保持
  return {p,opp,me,en,enUnits,myShields,oppShields,oppCreatureCount:enUnits.length,
          oppUntappedBlockers,oppBiggest,aggro,defenseNeed,avail:availMana(p),
          dangerLevel,oppBreakerTotal,myBlockerCount,oppHas2Threat:(cpuHirabonThreatProb(p)>0.3&&!iCanKill2)};
}
function cpuRemovalValue(card){
  let v=getAtkPower(card);
  if(card.num===1||card.num===3)v+=2;
  if(card.linkedWith)v+=2;
  return v;
}
/* 相手が次ターンにヒラボン(2)を使ってくる確率を推定する（0〜1）。
 *  ・相手フィールドに2がある → アタック時に確実に宣言できる（高確率）
 *  ・相手フィールドに2が無い → 手札から召喚が必要。相手のマナ(≥2)と手札の有無、
 *    および「場に見えている2の枚数」から、まだ持っている見込みを概算する。
 *    すでに複数の2が場/墓地に出ていれば、残りは少ない＝低確率とする。 */
function cpuHirabonThreatProb(p){
  const opp=(p===1)?2:1, en=G.players[opp];
  // フィールドに2がいる → ほぼ確実に攻撃時ヒラボン
  if(en.field.some(c=>c.num===2&&(!c.linkedWith||c.linkRoot))) return 0.95;
  // 手札から召喚する場合：マナ2以上＆手札があることが前提
  const canAfford = totalMana(opp)>=2;
  const hasHand = en.hand.length>0;
  if(!canAfford || !hasHand) return 0.05;
  // 2は全部で4枚（番号2×4色）。見えている(場+マナ+自分の墓地で確認できる)2を数えて残数から確率化
  let seen=0;
  [G.players[1],G.players[2]].forEach(pl=>{
    ['field','mana','graveyard'].forEach(z=>{ pl[z].forEach(c=>{ if(c.num===2)seen++; }); });
  });
  const remaining=Math.max(0,4-seen);           // まだ出ていない2の枚数
  if(remaining===0) return 0.03;                 // 全部使われた→ほぼ無い
  // 残数が多いほど・相手の手札が多いほど引いて持っている見込みが上がる
  const base=remaining/4;                        // 0.25〜1.0
  const handFactor=Math.min(1,en.hand.length/5); // 手札が多いほど持っている可能性
  return Math.min(0.6, base*handFactor*0.8);     // 手札からの場合は最大0.6（場にある場合より低い）
}
function cpuBreakerCount(card){
  if(card.num===0)return 3;
  if(card.num===7||card.num===9)return 2;
  return 1;
}
function cpuHirabonBest(ctx){
  const {me,en}=ctx; let best={num:0,gain:-Infinity};
  // 相手の未タップブロッカーの番号ごとの枚数（除去できると攻撃が通る）
  const blkByNum={};
  (ctx.oppUntappedBlockers||[]).forEach(c=>{ blkByNum[c.num]=(blkByNum[c.num]||0)+1; });
  const myAttackers=me.field.filter(c=>!c.tapped&&(!c.summonedThisTurn||c.speedAttacker)&&(!c.linkedWith||c.linkRoot));
  const totalBlockers=(ctx.oppUntappedBlockers||[]).length;
  // 相手の0(各色)はエクTジア(4色0で即勝ち)の部品。破壊すると相手の勝ち筋を直接潰せるため、
  // 単なる戦闘力以上の価値がある。相手が何色そろえているかに応じて妨害価値を上乗せする。
  const oppZeroColors=new Set(en.field.filter(c=>c.num===0).map(c=>c.color));
  for(let n=0;n<=9;n++){
    let oppLoss=0,myLoss=0;
    en.field.forEach(c=>{if(c.num===n)oppLoss+=cpuRemovalValue(c);});
    en.mana .forEach(c=>{if(c.num===n)oppLoss+=cpuRemovalValue(c)*CPU_W.manaHit;});
    me.field.forEach(c=>{if(c.num===n)myLoss+=(n===4?0:cpuRemovalValue(c));});  // 4は破壊→マナ送りなのでロス0
    me.mana .forEach(c=>{if(c.num===n)myLoss+=cpuRemovalValue(c)*CPU_W.manaHit;});
    if(n===2)myLoss+=2;
    // ── 自軍アタッカー巻き添えのテンポ損 ────────────────────────────────
    // 宣言番号(n)が自分の「今ターン攻撃できる」クリーチャーを巻き添えにすると、
    // そのターンに入れられたはずのシールド打点を丸ごと失う。特に0(トリプルブレイカー)は
    // 1体で3枚割れるため損失が大きい。この機会損失を myLoss に加算して、
    // 「2を出して0を宣言→自分の0を自爆させ、結局1点しか殴れない」ような自滅宣言を避ける。
    me.field.forEach(c=>{
      if(c.num===n && n!==4 && canAttack(ctx.p,c)){
        const lostBreak=Math.min(cpuBreakerCount(c), Math.max(ctx.oppShields,1));
        myLoss += lostBreak*(CPU_W.atkShield+ctx.aggro*CPU_W.atkAggro)*0.75;
      }
    });
    let gain=oppLoss-myLoss;
    // 相手の0を破壊する場合、エクTジア妨害ボーナスを加算。
    // エクTジアは4色そろえて初めて成立するため、相手が1色しか持っていない段階での妨害価値は低い。
    // 揃っている色数で切迫度をスケールし、3色（次で勝ち）に迫ったときだけ高評価する。
    if(n===0 && oppZeroColors.size>0){
      const zerosKilled=en.field.filter(c=>c.num===0).length;
      const urgency=(oppZeroColors.size>=3)?1.5:(oppZeroColors.size>=2)?0.7:0.25; // 1色:ほぼ無視 2色:中 3色:切迫
      gain += (zerosKilled+oppZeroColors.size)*CPU_W.exTjiaDeny*urgency;
    }
    // ブロッカー除去で攻撃が通るなら、突破価値を gain に上乗せして宣言番号を選ぶ判断に反映
    if(blkByNum[n] && myAttackers.length){
      const remaining=totalBlockers-blkByNum[n];
      if(remaining===0) gain += 5 + myAttackers.length*1.5; // 全ブロッカー除去＝攻撃が通る
      else gain += blkByNum[n]*1.5;
    }
    if(gain>best.gain)best={num:n,gain};
  }
  return best;
}

/* ════════════════ 4. 召喚カードのスコアリング ════════════════ */
/* 3,4リンク成立で場全体がスピードアタッカー化したとき、
 *  「今ターン即攻撃できるようになる味方」の一斉攻撃価値を見積もる。
 *  リンクしていなければ召喚酔いで攻撃できなかったクリーチャーが、
 *  リンク成立で即戦力になる＝その分のシールド打点が前倒しで入る。 */
function cpuLinkBurstValue(p,ctx,newCard){
  // リンク成立後に攻撃可能になる味方（今は召喚酔いだが、SA化すれば殴れる）
  // 既に攻撃可能な物は元から数えられているので、「召喚酔いで待機中」のものだけを評価
  const wakingUp=ctx.me.field.filter(c=>
    c.summonedThisTurn && !c.speedAttacker && (!c.linkedWith||c.linkRoot)
  );
  // 新たに出すこのカード自身もSA化して即攻撃できる
  const newCardBreak=cpuBreakerCount(newCard);
  let burstBreak=newCardBreak;
  wakingUp.forEach(c=>{ burstBreak+=cpuBreakerCount(c); });
  // 相手のシールド・ブロッカー状況で、その打点がどれだけ価値になるか
  const effectiveBreak=Math.min(burstBreak, ctx.oppShields+1); // 割り切り＋ダイレクト1
  if(effectiveBreak<=0)return 0;
  // 攻撃の後押し（相手シールドが薄いほど高い）。一斉攻撃での押し込み価値。
  return effectiveBreak*(CPU_W.atkShield*0.5+ctx.aggro*CPU_W.atkAggro*0.4);
}

/* 7の最終効果（任意カードを任意ゾーンへ移動）の最善手を、攻守バランスで決める。
 *  7は大体終盤に使うので、相手とCPUのシールド危険度を踏まえてパターンを比較する。
 *  返り値: {card, fromOwner, dest, toOwner, score, label} または null
 *  評価するパターン:
 *   【攻撃寄り】
 *     ・相手の未タップブロッカーをデッキ/墓地送り → 攻撃が通る
 *     ・相手シールドが残り1枚なら、そのシールドを墓地送り(=実質ブレイク) ※7では不可なので相手場のカード除去で代替
 *   【防御寄り】
 *     ・相手の攻撃可能クリーチャー(最大打点)をデッキ送り → 次ターンの被弾減
 *     ・自分の8を引っ張ってシールドに伏せる → 守りを固める(ST8で全タップの逆転も)
 */
function cpu7BestFinalMove(p, ctx){
  const opp=p===1?2:1;
  const me=G.players[p], en=G.players[opp];
  const myAttackers=me.field.filter(c=>canAttack(p,c));
  const myBreakTotal=myAttackers.reduce((s,c)=>s+cpuBreakerCount(c),0);
  const myUnits=me.field.filter(c=>!c.linkedWith||c.linkRoot);
  const myBreakNext=myUnits.reduce((s,c)=>s+cpuBreakerCount(c),0);  // 次ターン全員アンタップ前提
  const oppHandEmpty=en.hand.length===0;
  const zoneOf=(c)=> me.hand.includes(c)?'hand': me.mana.includes(c)?'mana': me.graveyard.includes(c)?'grave':'field';
  const candidates=[];

  // 【攻撃1】相手の未タップブロッカーを墓地送り → 攻撃が通る
  //   ※ 手札やデッキへ戻すと相手に札を残す/戻すので、除去は基本「墓地」。
  ctx.oppUntappedBlockers.forEach(b=>{
    const remaining=ctx.oppUntappedBlockers.length-1;
    let val=cpuRemovalValue(b)*CPU_W.removal;
    if(remaining===0 && myAttackers.length){
      // 全ブロッカー除去→攻撃が通る。シールドを割り切れるなら勝ち級
      if(myBreakTotal>=ctx.oppShields) val+=CPU_W.atkShield*ctx.oppShields+CPU_W.aggro*5+10;
      else val+=myBreakTotal*(CPU_W.atkShield+ctx.aggro*CPU_W.atkAggro);
    }
    candidates.push({card:b,fromOwner:opp,fromZone:'field',dest:'grave',toOwner:opp,defensive:false,score:val,label:`相手ブロッカー${CJ[b.color]}${b.num}を墓地送り`});
  });

  // 【攻撃2】相手シールドを直接墓地へ（割らずに減らす＝割り切りに近づく／相手に手札を与えない）
  const oppShieldIdx=en.shields.findIndex(s=>s!==null);
  if(oppShieldIdx!==-1 && ctx.oppShields>0){
    let val=CPU_W.atkShield*1.3 + ctx.aggro*CPU_W.atkAggro;
    if(ctx.oppShields<=2) val+=4;                                   // 残り少ない＝リーサルに近い
    if(myAttackers.length>ctx.oppUntappedBlockers.length) val+=3;   // 押し切れる布陣なら直後に効く
    candidates.push({shield:true,shieldIdx:oppShieldIdx,fromOwner:opp,fromZone:'shield',dest:'grave',toOwner:opp,defensive:false,score:val,label:`相手シールドを墓地送り`});
  }

  // 【妨害】終盤・相手手札0・現在ブロッカー無し・こちらが次ターンの攻撃で勝てる布陣 →
  //   相手フィールドの非ブロッカー(0/4/5など)をデッキ上に戻し、次ドローを腐らせる。
  //   ※ 墓地送りだと相手が次にブロッカー(1/3)を引いて守る目が残るが、デッキ上固定なら
  //      守り札を引かせず確実に詰められるので、この局面ではデッキ戻しを最優先する。
  //   ※ 現在ブロッカーが居るなら、それを墓地送りする方(上の候補)が良いのでデッキ戻しはしない。
  if(oppHandEmpty && ctx.oppShields>0 && ctx.oppUntappedBlockers.length===0
     && myUnits.length>0 && myBreakNext>=ctx.oppShields){
    const junk=ctx.enUnits.filter(c=>c.num!==1&&c.num!==3)               // 守りに使えない＝戻して困らせる
      .sort((a,b)=>{const pri=n=>(n===0?3:n===4?3:n===5?2:1);return pri(b.num)-pri(a.num);});
    if(junk.length){
      candidates.push({card:junk[0],fromOwner:opp,fromZone:'field',dest:'deck',toOwner:opp,defensive:false,score:20,label:`相手の${CJ[junk[0].color]}${junk[0].num}をデッキ上に戻し引きを腐らせる`});
    }
  }

  // 【防御1】相手の最大アタッカーを墓地送り → 被弾減
  const oppAttackers=ctx.enUnits.slice().sort((a,b)=>cpuBreakerCount(b)-cpuBreakerCount(a));
  if(oppAttackers.length){
    const big=oppAttackers[0];
    const removedBreak=cpuBreakerCount(big);
    const urgency=Math.max(1,3-ctx.dangerLevel);                    // 不利なほど価値大
    const val=cpuRemovalValue(big)*CPU_W.removal + removedBreak*CPU_W.defShield*urgency*0.6;
    candidates.push({card:big,fromOwner:opp,fromZone:'field',dest:'grave',toOwner:opp,defensive:true,score:val,label:`相手アタッカー${CJ[big.color]}${big.num}を墓地送り`});
  }

  // 【展開1】自分の2を手札/マナ/墓地から場へ（召喚時ヒラボン＝同番号を一括破壊＋打点本体）
  //   ・cpuHirabonBest の純利益(hb.gain)は「相手の同番号を合算した除去益 − 自分の同番号被害
  //     − テンポ損 ＋ エクTジア妨害」を内包。よって複数の脅威を巻き込めるほど高く、
  //     逆に自分も同番号を持つ（巻き添えになる）ときは自動的に低く出る（ユーザー指摘のデメリット）。
  //   ・加えて2が盤面に残るので展開＝次以降のヒラボン圧という将来価値も足す。
  //   → 大型でも複数でも、単体除去（墓地/デッキ送り）より効率的なら2召喚が選ばれる。
  const my2=[...me.hand,...me.mana,...me.graveyard].find(c=>c.num===2);
  if(my2){
    const hb=cpuHirabonBest(ctx);
    // 宣言番号で消える相手クリーチャーのブレイク合計＝被弾減（単体除去候補と同じ防御クレジット）。
    const urgency=Math.max(1,3-ctx.dangerLevel);
    const oppBreakRemoved=en.field.filter(c=>c.num===hb.num&&(!c.linkedWith||c.linkRoot))
                                  .reduce((s,c)=>s+cpuBreakerCount(c),0);
    const val = getAtkPower(my2)*CPU_W.body + cpuBreakerCount(my2)*CPU_W.breaker*0.5      // 本体（展開）
              + Math.max(0,hb.gain)*CPU_W.removal*0.85                                     // 破壊純利益（複数破壊/自爆デメリット込み）
              + oppBreakRemoved*CPU_W.defShield*urgency*0.6                                // 脅威除去による被弾減（墓地送り候補と同等）
              + 1.5;                                                                       // 場に2が残る将来価値
    candidates.push({card:my2,fromOwner:p,fromZone:zoneOf(my2),dest:'field',toOwner:p,defensive:false,score:val,label:`自分の2を場に出す（ヒラボン宣言${hb.num}）`});
  }

  // 【展開2】自分の3か4を場に出して 3-4 リンクを作る → 場全体がスピードアタッカー（今ターン追撃）
  const fieldHas=(n)=>me.field.some(c=>c.num===n&&(!c.linkedWith||c.linkRoot));
  let linkCard=null;
  if(fieldHas(3)) linkCard=[...me.hand,...me.mana,...me.graveyard].find(c=>c.num===4);
  if(!linkCard && fieldHas(4)) linkCard=[...me.hand,...me.mana,...me.graveyard].find(c=>c.num===3);
  if(linkCard){
    // 追撃できる頭数が増えるほど価値大。攻めの局面(aggro)で特に有効。
    const extraAtk=myUnits.length; // リンクで場全体がSA→既存の召喚酔いも含め殴れる
    const val=getAtkPower(linkCard)*CPU_W.body + CPU_W.breaker + ctx.aggro*CPU_W.aggro*2 + Math.min(extraAtk,3)*CPU_W.atkShield*0.5 + 2;
    candidates.push({card:linkCard,fromOwner:p,fromZone:zoneOf(linkCard),dest:'field',toOwner:p,defensive:false,score:val,label:`自分の${linkCard.num}を出して3-4リンク`});
  }

  // 【防御2】自分の8を手札/マナ/墓地からシールドに伏せる（シールドが薄いとき）
  if(ctx.myShields<=2){
    const my8=[...me.hand,...me.mana,...me.graveyard].find(c=>c.num===8);
    if(my8){
      const val=CPU_W.defShield*2.5 + (3-ctx.myShields)*2 + 4;
      candidates.push({card:my8,fromOwner:p,fromZone:zoneOf(my8),dest:'shield',toOwner:p,defensive:true,score:val,label:`自分の8をシールドに伏せる`});
    }
  }

  if(!candidates.length)return null;
  candidates.sort((a,b)=>b.score-a.score);
  return candidates[0];
}

function cpuScoreCard(p,card,ctx){
  if(!canSummon(p,card))return {score:-Infinity,plan:null};
  const cost=getSummonCost(p,card);
  let score=0; const plan={cardId:card.id};

  // ── 自分のアタック時ヒラボンと番号が衝突する“無駄召喚”を避ける ─────────────
  // このターン、場の2でアタック時ヒラボンを撃つ見込みがあり、その宣言番号が
  // これから出すカードと同じだと、召喚しても自分のヒラボンで一緒に壊れてしまう。
  // ヒラボンは手札を対象にしないので、その番号は手札に温存する方が良い → 召喚しない。
  // 「実際に場に出した盤面」で判定するため、出すことで宣言先が別番号に変わって生き残る
  // ケースでは通常どおり召喚を検討する（過剰抑制を避ける）。
  if(card.num!==2 && ctx.me.field.some(c=>c.num===2&&canAttack(p,c)&&(!c.linkedWith||c.linkRoot))){
    const me=ctx.me, handBak=me.hand;
    me.hand=me.hand.filter(c=>c.id!==card.id);   // 捨て札候補から自身を除き
    me.field.push(card);                          // 仮に場に出した状態を作る
    let collide=false;
    try{
      const hpAfter=cpuHirabonAttackPlan(p,ctx);
      collide=!!(hpAfter && hpAfter.marginal>2 && hpAfter.declareNum===card.num);
    }finally{
      me.field.pop(); me.hand=handBak;            // 盤面を必ず元に戻す
    }
    if(collide) return {score:-50, plan};         // 出しても自爆するだけ → 召喚しない
  }

  if(card.num!==8)score+=getAtkPower(card)*CPU_W.body;
  const willHaveSpeed=ctx.me.field.some(c=>c.linkedWith&&((c.num===3&&c.linkedWith.num===4)||(c.num===4&&c.linkedWith.num===3)));
  const breakDelay=willHaveSpeed?1.0:0.5;
  if(card.num!==8){
    const bc=cpuBreakerCount(card);
    score+=bc*CPU_W.breaker*breakDelay;
    score+=bc*ctx.aggro*CPU_W.aggro;
  }
  // ── 危険度ボーナス ──────────────────────────────────────────────────
  // dangerLevel = 次ターン攻撃を受けた後に残るシールド枚数
  //   ≤0: シールド全壊＝敗北圏  1: 残り1枚で危機  2: 注意  ≥3: 安全/有利
  // defBonus: 防御カード(1/3/2)を危機ほど優先（ただしブロッカー1枚で止められる打点には限りが
  //   あるので上限を設け、絶望局面で単体ブロッカーを過大評価しないようにする）
  const defBonus  = Math.min(20, Math.max(0, (2 - ctx.dangerLevel)) * 8); // 上限20
  const atkBonus  = Math.max(0, (ctx.dangerLevel - 2) * 2.5);
  const inDanger  = ctx.dangerLevel <= 1;
  const inControl = ctx.dangerLevel >= 3;

  switch(card.num){
    case 0:{
      score+=CPU_W.freeBonus;
      const zc=new Set([...ctx.me.hand,...ctx.me.field].filter(c=>c.num===0).map(c=>c.color));
      if(!zc.has(card.color)){
        const after=zc.size+1;
        if(after>=4)score+=CPU_W.extjia*2; else score+=CPU_W.extjia*(after/4);
      }
      if(ctx.me.hand.some(c=>c.num===5&&c.color===card.color&&canSummon(p,c)))score-=5;
      // ── 0の一斉召喚リスク（相手の2による一掃）──────────────────────────
      // 2(平岡)は「番号を宣言して場・マナの同番号を全破壊」する。一方0は手札に持っている限り
      // 2の影響を受けず（destroyByNumは手札を対象にしない）、エクTジアは手札+場で判定する。
      // → 0を場に複数並べる必要性は薄く、並べると1枚の2でまとめて飛ぶリスクだけが大きい。
      // 「場に並ぶ0の総数」と「相手が2を使える蓋然性(cpuHirabonThreatProbで推定)」に比例して
      // 強く減点する。相手の2が墓地/マナに出払っていればprobが下がり、まとめ置きも許容される。
      const zerosOnField=ctx.me.field.filter(c=>c.num===0).length;
      // 4色目＝エクTジア即勝ちはリスク無視で出す
      const isFinishingColor=!zc.has(card.color)&&(zc.size+1>=4);
      if(!isFinishingColor){
        const exposed=zerosOnField+1;            // この0を出すと場に並ぶ0の総数（=2で同時に失う枚数）
        if(exposed>=2){                          // 1枚だけなら一掃されても損失は小さい→許容
          const threat=cpuHirabonThreatProb(p);  // 0〜0.95（場の2/相手マナ・手札・既出2枚数から推定）
          // 並べるほど（exposed-1）・2が来そうなほど（threat）強く避ける。
          // freeBonusやextjia加点を上回り得る水準（係数13）にして、序盤のまとめ置きを抑止。
          score-=threat*(exposed-1)*CPU_W.zeroStackRisk;
        }
      }
      score-=zerosOnField*1; // 従来のまとめ置き微減点（残し）
      if(ctx.me.field.some(c=>c.num===5)&&ctx.me.graveyard.length)score+=1.5;
      if(inControl)score+=atkBonus*0.5; // 有利時はエクTジア/トリプルを加速
      break;
    }
    case 1:{
      score+=CPU_W.blocker*(0.4+ctx.defenseNeed);
      if(ctx.en.field.some(c=>c.num===0))score+=CPU_W.blocker*2;
      score+=defBonus; // 危機時は最優先で場に出す
      break;
    }
    case 2:{
      const b=cpuHirabonBest(ctx); plan.declareNum=b.num;
      const oppHas0   =ctx.en.field.some(c=>c.num===0)||ctx.en.mana.some(c=>c.num===0);
      const oppHas9   =ctx.en.field.some(c=>c.num===9)||ctx.en.mana.some(c=>c.num===9);
      const oppHasLink=ctx.en.field.some(c=>c.linkedWith&&c.linkRoot);
      // ── ブロッカー除去でダイレクト/追加ブレイクが通る価値 ──────────────
      // 2の宣言で相手の未タップブロッカーを除去できると、こちらの攻撃が止められなくなる。
      // 「除去後に自分の攻撃可能クリーチャーで何点入るか」を攻撃価値として加算する。
      const myAttackers=ctx.me.field.filter(c=>canAttack(p,c));
      const oppBlockerNums=ctx.oppUntappedBlockers.map(c=>c.num);
      // 宣言番号(b.num)が相手ブロッカーの番号と一致する＝そのブロッカーを除去できる
      const clearsBlocker=oppBlockerNums.includes(b.num);
      let breakthroughBonus=0;
      if(clearsBlocker && myAttackers.length){
        const removedBlockers=ctx.oppUntappedBlockers.filter(c=>c.num===b.num).length;
        const remainingBlockers=ctx.oppUntappedBlockers.length-removedBlockers;
        const myBreakTotal=myAttackers.reduce((s,c)=>s+cpuBreakerCount(c),0);
        if(remainingBlockers===0){
          // 全ブロッカー除去 → 攻撃が通る。シールドを割り切ってダイレクトなら勝ち級の価値
          if(myBreakTotal>=ctx.oppShields){
            breakthroughBonus=CPU_W.atkShield*ctx.oppShields + CPU_W.aggro*5 + 8; // ダイレクト勝利圏
          }else{
            breakthroughBonus=myBreakTotal*(CPU_W.atkShield+ctx.aggro*CPU_W.atkAggro);
          }
        }
      }
      // ── 相手の2を破壊する価値（侮らない）──────────────────────────────
      // 相手の場に2がいると、次ターンの攻撃時ヒラボンで自分のブロッカーや盤面を
      // まとめて壊される。特にシールドが不利なときは最優先で2を消したい。
      // ただし相手に0(エクTジア部品)など2より価値の高い破壊対象があるなら、
      // そちらの宣言を優先する。cpuHirabonBestが番号ごとの利益(gain)を持つので、
      // 「2を宣言したときの利益」と「best(b)の利益」を比較して宣言番号を決める。
      const oppHas2OnField=ctx.en.field.some(c=>c.num===2&&(!c.linkedWith||c.linkRoot));
      let kill2Bonus=0;
      if(oppHas2OnField){
        const disadvantage=Math.max(0, 3-ctx.dangerLevel); // dangerLevelが低いほど大
        kill2Bonus = CPU_W.removal*4 + disadvantage*3;
        // 2を宣言したときの実利益を見積もる（相手2破壊 − 自分2巻き添え）。
        const oppLoss2=ctx.en.field.filter(c=>c.num===2).reduce((s,c)=>s+cpuRemovalValue(c),0)
                      +ctx.en.mana.filter(c=>c.num===2).reduce((s,c)=>s+cpuRemovalValue(c)*CPU_W.manaHit,0);
        const myLoss2 =ctx.me.field.filter(c=>c.num===2).reduce((s,c)=>s+cpuRemovalValue(c),0)
                      +ctx.me.mana.filter(c=>c.num===2).reduce((s,c)=>s+cpuRemovalValue(c)*CPU_W.manaHit,0)+2;
        const gain2=(oppLoss2-myLoss2)+kill2Bonus; // 2宣言の総合利益（脅威除去ボーナス込み）
        // best(b)が2でないなら、その利益(b.gain)と2宣言の利益(gain2)を比べて高い方を宣言。
        // これにより「相手に0がいるのに2を破壊して0を残す」誤りを防ぐ。
        if(b.num!==2 && gain2>b.gain){
          plan.declareNum=2;
        }
        // 実際に宣言する番号が2でないなら、2巻き添え前提のkill2Bonusは加点しない
        if(plan.declareNum!==2) kill2Bonus=0;
      }
      // ── 相手アタッカー除去の防御価値 ────────────────────────────────────
      // 宣言番号(b.num)で相手フィールドの攻撃可能クリーチャーを破壊できると、
      // 次ターンに受けるブレイク打点が減る＝防御になる。不利なほど価値が高い。
      const oppUnitsOfNum=ctx.en.field.filter(c=>c.num===b.num&&(!c.linkedWith||c.linkRoot));
      let defenseRemovalBonus=0;
      if(oppUnitsOfNum.length){
        const removedBreak=oppUnitsOfNum.reduce((s,c)=>s+cpuBreakerCount(c),0); // 消せる打点
        // 自分が不利(dangerLevel低)なほど、打点を減らす価値を高く評価
        const urgency=Math.max(1, 3-ctx.dangerLevel);
        defenseRemovalBonus = removedBreak*CPU_W.defShield*urgency*0.6;
      }
      // 緊急時（dangerLevel≤0）は利益>0なら召喚して少しでも脅威を除去
      const gainThreshold=ctx.dangerLevel<=0?0:8;
      const hasTarget =oppHas0||oppHas9||oppHasLink||oppHas2OnField||clearsBlocker||oppUnitsOfNum.length>0||b.gain>=gainThreshold;
      if(hasTarget){
        score+=b.gain*CPU_W.removal;
        score+=breakthroughBonus;
        score+=kill2Bonus;
        score+=defenseRemovalBonus;
        // defBonusは「ブロッカー召喚」前提の防御加点。2は除去で防御するので二重計上を避け控えめに。
        score+=Math.min(defBonus*0.4, defenseRemovalBonus); // 除去防御がある分defBonusは抑制
      }else{
        return {score:-5, plan:null, cost};
      }
      break;
    }
    case 3:{
      score+=CPU_W.blocker*(0.5+ctx.defenseNeed);
      if(ctx.en.field.some(c=>c.num===0))score+=CPU_W.blocker*2;
      score+=defBonus; // 危機時は最優先で場に出す
      // 同色4と組めるか（場に未リンクの同色4 or 手札に同色4）
      const fieldLink=ctx.me.field.some(c=>c.num===4&&c.color===card.color&&!c.linkedWith);
      const handLink=ctx.me.hand.some(c=>c.num===4&&c.color===card.color);
      if(fieldLink||handLink)score+=CPU_W.link;
      // 定石：3,4リンクが成立すると場全体がスピードアタッカー化＝召喚酔い中の味方も即攻撃可。
      // 場に「今ターン召喚して攻撃待ち」のクリーチャーが多いほど、一斉攻撃の価値が高い。
      if(fieldLink){ // この3を出せば即リンク成立（場に同色4がいる）
        score+=cpuLinkBurstValue(p,ctx,card);
      }
      break;
    }
    case 4:{
      score+=1.0;
      const fieldLink=ctx.me.field.some(c=>c.num===3&&c.color===card.color&&!c.linkedWith);
      const handLink=ctx.me.hand.some(c=>c.num===3&&c.color===card.color);
      if(fieldLink||handLink)score+=CPU_W.link;
      if(fieldLink){ // この4を出せば即リンク成立（場に同色3がいる）
        score+=cpuLinkBurstValue(p,ctx,card);
      }
      break;
    }
    case 5:{
      const heavy=ctx.me.hand.filter(c=>c.num>=6&&c.num!==card.num).length;
      score+=heavy*0.8;
      const can=ctx.me.field.some(c=>c.num===5&&c.color===card.color&&!c.linkedWith)||ctx.me.hand.some(c=>c.num===5&&c.color===card.color&&c.id!==card.id);
      if(can)score+=CPU_W.link;
      // 定石：5マナで5を出す→コスト−1（5+5なら−5）→残りマナで0や1,2を展開。
      // 5を出した後の残マナで「追加召喚できる手札カード」が増える価値を見積もる。
      // 5召喚後の残availを概算（5はコスト5、軽減は他カードに効く）
      const after5Avail = ctx.avail - getSummonCost(p,card);
      if(after5Avail>0){
        // 5がいるとコスト−1。手札の召喚候補が「軽くなって出せる」数を数える
        let comboValue=0;
        ctx.me.hand.forEach(c=>{
          if(c.id===card.id)return;
          if(c.num===0){ comboValue+=2; }            // 0はコスト0だが5があると墓地回収が付く
          else {
            const reduced=Math.max(1,(c.num===8?4:c.num)-1); // 5の軽減後コスト
            if(reduced<=after5Avail && c.num>=1 && c.num<=3) comboValue+=1.5; // 1,2,3を続けて出せる
          }
        });
        score+=comboValue;
      }
      if(ctx.me.hand.some(c=>c.num===0))score+=2.5;   // 手札に0→5を先に出すと墓地回収が使える
      if(inControl)score+=atkBonus*0.3;
      break;
    }
    case 6:{
      if(ctx.enUnits.length){
        const t=ctx.enUnits.reduce((a,b)=>cpuRemovalValue(a)>=cpuRemovalValue(b)?a:b);
        if(cpuRemovalValue(t)>=4){
          plan.bounceTargetId=t.id; score+=cpuRemovalValue(t)*CPU_W.removal*0.7;
          if(inDanger)score+=defBonus*0.6; // 危機時・強力なカードを戻すのは防御にもなる
        }else{ score-=1.5; }
      }else score-=2.0;
      break;
    }
    case 7:{
      const others=[...ctx.me.hand.filter(c=>c.num===7&&c.id!==card.id),
                    ...ctx.me.mana.filter(c=>c.num===7),
                    ...ctx.me.graveyard.filter(c=>c.num===7)];
      if(others.length){
        plan.chain7Ids=others.map(c=>c.id);
        const per=getAtkPower(card)*CPU_W.body+2*CPU_W.breaker*breakDelay+CPU_W.sevenChain;
        score+=others.length*per;
      }
      // 7の最終効果は攻守バランスで決める（cpu7BestFinalMoveが攻撃/防御パターンを比較）
      const fm=cpu7BestFinalMove(p,ctx);
      if(fm){
        plan.finalMove=fm;                       // 移動先の詳細プラン
        plan.finalMoveTargetId=fm.card?fm.card.id:null; // 後方互換（シールド源はcard無し）
        score+=fm.score;
        if(inDanger && fm.defensive)score+=defBonus*0.5;
      }else if(ctx.enUnits.length){
        // フォールバック：最強の敵をデッキ送り
        const t=ctx.enUnits.reduce((a,b)=>cpuRemovalValue(a)>=cpuRemovalValue(b)?a:b);
        plan.finalMoveTargetId=t.id; score+=cpuRemovalValue(t)*CPU_W.removal*1.2;
        if(inDanger)score+=defBonus*0.5;
      }
      score+=atkBonus*0.8; // 有利時は7連鎖で一気に決める
      break;
    }
    case 8:{
      // 片スパは相手ターンのアンタップで無効になる。
      // 「今ターン中に自分の攻撃でブロッカーをタップ→シールドを割り切ってダイレクト勝利」に
      // 繋がるときのみ召喚する。それ以外はチャージ要員（-10 = 緊急閾値-6 より低く絶対選ばない）
      const myAttackers=ctx.me.field.filter(c=>canAttack(p,c));
      const hasBlockers=ctx.oppUntappedBlockers.length>0;
      // 8で全タップ→ブロッカー0と仮定してcpuHasLethalを評価
      const ctxNoBlk=Object.assign({},ctx,{oppUntappedBlockers:[]});
      const lethalsWithTap=myAttackers.length>0&&hasBlockers&&cpuHasLethal(p,ctxNoBlk);
      if(!lethalsWithTap) return {score:-10, plan:null, cost};
      // 8で勝ちに繋がる：大幅加点
      score+=ctx.oppUntappedBlockers.length*CPU_W.blocker*3;
      score+=myAttackers.length*CPU_W.atkShield*2;
      score+=ctx.aggro*CPU_W.atkAggro*2;
      break;
    }
    case 9:{
      score+=ctx.aggro*3.0;
      score+=atkBonus*1.2;  // 有利時はフィニッシャーを積極的に
      if(inDanger)score-=defBonus*0.4; // 危機時は大型より防御を優先（ただし完全には消さない）
      break;
    }
  }
  score+=card.num*CPU_W.bigNum;        // 大きい数字を優先（4,5,6,7,8,9ほど加点）
  score-=cost*CPU_W.costEff;
  return {score,plan,cost};
}
function cpuChooseBestPlay(p,minScore=0.5){
  const ctx=cpuEvalBoard(p); let best=null;
  for(const card of G.players[p].hand){
    const r=cpuScoreCard(p,card,ctx);
    if(r.score===-Infinity)continue;
    if(!best||r.score>best.score)best={card,score:r.score,plan:r.plan,cost:r.cost};
  }
  if(!best)return null;
  // 緊急時（自シールド≤2 or dangerLevel≤0）はスコア閾値を大幅緩和して必ず行動する
  // -6 に設定：card2(対象なし)=-5 より低いのでそれも拾う
  const emergency = ctx.myShields<=2 || ctx.dangerLevel<=0;
  const threshold = emergency ? -6 : minScore;
  if(best.score<threshold)return null;
  return best;
}

/* ════════════════ 5. マナチャージ ════════════════ */
function cpuKeepValue(p,card,ctx){
  // このゲームの本質：序盤は 0,1,2,3 の小型カードの組み合わせ勝負。
  //   9 はほぼ召喚しない（コスト9・攻撃力ゲームでない）→ 積極的にチャージ要員。
  //   5,7 は終盤に役割が出る。8 は基本チャージ要員。
  // keep が低いほど「手放してチャージしてよい」。チャージ優先度（手放す順）は:
  //   9 → 4 → 8 → 7 → 6 → 5 …（高数字＝マナ要員）、温存は 0,2,3,1（序盤の主役）
  const lateGame = ctx.oppShields<=2 || ctx.myShields<=2; // 終盤＝どちらかのシールドが薄い
  let v;
  switch(card.num){
    case 0: v=100; break;                  // コスト0で出せる・エクTジアの鍵。絶対温存
    case 2: v=7; break;                    // 除去の要。序盤の主役なので温存
    case 1: v=5+ctx.defenseNeed*2; break;  // ブロッカー／序盤の主役。温存寄り
    case 3: v=5+ctx.defenseNeed*2; break;  // ブロッカー／同上
    case 5:
      // 終盤は5の役割(コスト軽減・0の墓地回収)が出るので温存寄り、序盤はチャージ可
      v=lateGame?4:2;
      if(G.players[p].field.some(c=>c.num===5))v=Math.min(v,2); // 既に場に5があれば温存不要
      break;
    case 6: v=lateGame?3.5:2; break;       // 終盤はバウンス役、序盤はチャージ可
    case 7:
      // 7は手札1枚でも、マナや墓地の7を連鎖で引ける。序盤に手札保持の必要性は低い。
      // 終盤に連鎖フィニッシュの役割が出るので、終盤かつ複数あるときだけ温存。
      {
        const others=G.players[p].hand.filter(c=>c.num===7&&c.id!==card.id).length
                    +G.players[p].mana.filter(c=>c.num===7).length
                    +G.players[p].graveyard.filter(c=>c.num===7).length;
        if(lateGame && others>=1) v=8;     // 終盤＆連鎖の弾あり＝温存
        else v=1.8;                        // それ以外はチャージ要員
      }
      break;
    case 8: v=1.5; break;                  // 基本チャージ要員（手札召喚は限定的な勝ち筋のみ）
    case 4: v=1.2; break;                  // 破壊されてもマナに戻る＝最もマナ向き
    case 9: v=1.0; break;                  // ほぼ召喚しない＝最優先でチャージ要員
    default: v=card.num*0.5;
  }
  return v;
}
function cpuManaUtility(p,card,ctx){
  const me=G.players[p]; let v=1;
  if(card.num===9)v+=1.5;
  if(card.num===4)v+=CPU_W.mana4;
  // 序盤（マナ6以下）に4以外の同じ数字を重複チャージしない（相手2の宣言対策）
  // 重複リスクがある場合はペナルティを与え、色ボーナスも与えない
  const dupRisk=card.num>0&&card.num!==4&&totalMana(p)<6&&me.mana.some(c=>c.num===card.num);
  if(!dupRisk){
    const hasWild=me.mana.some(c=>c.num===9||c.num===0); // 9・0は全色対応マナ
    if(!hasWild){
      const haveColor=me.mana.some(c=>c.color===card.color);
      const want=me.hand.some(c=>c.color===card.color&&c.id!==card.id&&c.num!==0);
      if(!haveColor&&want)v+=3;
    }
  }else{
    v-=3; // 重複チャージは明確なペナルティ（色ボーナスなし）
  }
  return v;
}
// チャージ選択（look-ahead方式）
// 「どのカードをチャージすれば、そのターンに最も価値の高い召喚ができるか」を
// 全パターン（各手札カードをチャージ / チャージしない）でシミュレートして決める。
// これは人間の「このターン出したいカードから逆算してチャージを決める」思考に対応。
function cpuChooseManaCharge(p,opts={}){
  const me=G.players[p], hand=me.hand;
  if(!hand.length)return null;

  // 指定したマナ構成での「そのターンに出せる召喚の合計価値」を概算する
  // （マナを仮に置いた状態でcpuScoreCardを評価し、出せるカードの上位を貪欲に足す）
  // さらに「召喚し終えた後、相手の次ターンに殴り倒されるリスク」を差し引く。
  function evalWithMana(extraManaCard){
    // 仮想的にマナを追加した状態を作る（破壊的変更を避けるためバックアップ）
    const manaBackup=me.mana.slice();
    const handBackup=me.hand.slice();
    if(extraManaCard){
      me.mana=me.mana.concat([extraManaCard]);
      me.hand=me.hand.filter(c=>c.id!==extraManaCard.id);
    }
    // この状態で各手札カードのスコアを計算し、コスト内で出せる最大スコアを貪欲に見積もる
    const ctx2=cpuEvalBoard(p);
    let availMP=availMana(p);
    const scored=me.hand.map(c=>{
      const r=cpuScoreCard(p,c,ctx2);
      return {card:c,score:r.score,cost:(r.cost!==undefined?r.cost:getSummonCost(p,c))};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
    // 貪欲にマナの許す範囲で召喚価値を合計しつつ、出す予定のカードを記録
    let total=0, used=0; const willPlay=[];
    for(const s of scored){
      if(used+s.cost<=availMP){ total+=s.score; used+=s.cost; willPlay.push(s.card); }
    }
    evalWithMana._lastWillPlay=willPlay.map(c=>c.id);
    // ── 次ターン被弾リスク ──────────────────────────────────────────────
    // 今ターンこれらを召喚した後、自分の守り(シールド + 場に残る&新規のブロッカー)が
    // 相手の次ターンの打点に耐えられるか。耐えられないならリスクとして大きく減点。
    const opp=(p===1)?2:1;
    const oppBreak=G.players[opp].field.filter(c=>!c.linkedWith||c.linkRoot)
                     .reduce((s,c)=>s+cpuBreakerCount(c),0);
    const myShields=me.shields.filter(Boolean).length;
    // 場に既にいるブロッカー + 今ターン召喚予定のブロッカー(1/3)
    let myBlockers=me.field.filter(c=>(c.num===1||c.num===3)&&(!c.linkedWith||c.linkRoot)).length;
    myBlockers+=willPlay.filter(c=>c.num===1||c.num===3).length;
    // 相手のヒラボン確率：ブロッカーが同番号で複数並ぶと、まとめて消される期待損失
    const hirabProb=cpuHirabonThreatProb(p);
    // 召喚予定+既存で「1」「3」それぞれ何体並ぶか→多い方がヒラボンで飛ぶ想定
    const allBlk=me.field.filter(c=>(c.num===1||c.num===3)&&(!c.linkedWith||c.linkRoot))
                  .concat(willPlay.filter(c=>c.num===1||c.num===3));
    const n1=allBlk.filter(c=>c.num===1).length, n3=allBlk.filter(c=>c.num===3).length;
    const expectedBlkLoss=hirabProb*Math.max(n1,n3); // ヒラボンで失うブロッカーの期待値
    const effectiveBlockers=Math.max(0, myBlockers - expectedBlkLoss);
    const defense=myShields+effectiveBlockers;
    // 守りが相手の打点を下回る＝次ターン致死の恐れ → ペナルティ
    let riskPenalty=0;
    if(oppBreak>0 && defense<oppBreak){
      riskPenalty=(oppBreak-defense)*(CPU_W.defShield+CPU_W.blocker)*1.2;
    }
    // 復元
    me.mana=manaBackup; me.hand=handBackup;
    return total - riskPenalty;
  }

  // 候補: 各手札カードをチャージ / チャージしない(null)
  const noChargeProjected=evalWithMana(null);
  // 守る：チャージしなくても今ターン召喚する予定のカードはマナに回さない（除去札の2を捨てる事故を防ぐ）
  const protectedIds=new Set(evalWithMana._lastWillPlay||[]);
  let best={card:null, projected:noChargeProjected, chargeScore:0};
  let anyChargeEnablesSummon=false;
  let bestSafe=null; // 重複しない安全な候補のうち最良
  for(const card of hand){
    if(card.num===0)continue; // 0は絶対にチャージしない
    if(protectedIds.has(card.id))continue; // 今ターン召喚予定のカードはチャージ候補から除外
    const projected=evalWithMana(card);
    const ctx=cpuEvalBoard(p);
    let keep=cpuKeepValue(p,card,ctx);
    const me2=G.players[p];
    const sameCount=me2.mana.filter(c=>c.num===card.num).length
                   +me2.field.filter(c=>c.num===card.num).length;
    const isDup=(card.num!==4 && sameCount>0); // 4以外で同番号が既にある＝重複
    if(isDup){
      const hp=cpuHirabonThreatProb(p);
      keep += sameCount*(5+hp*8); // 重複ペナルティ（強め）
    }
    const net=projected - keep;
    if(net>0 && projected>noChargeProjected) anyChargeEnablesSummon=true;
    if(net>best.chargeScore){
      best={card,projected,chargeScore:net,keep,isDup};
    }
    // 重複しない候補の中での最良も記録（安全策）
    if(!isDup && projected>noChargeProjected){
      const safeNet=projected - cpuKeepValue(p,card,ctx);
      if(!bestSafe || safeNet>bestSafe.chargeScore){
        bestSafe={card,projected,chargeScore:safeNet};
      }
    }
  }
  // bestが重複札で、同等以上に働く非重複の安全策があるならそちらを優先
  if(best.card && best.isDup && bestSafe){
    best={card:bestSafe.card,projected:bestSafe.projected,chargeScore:bestSafe.chargeScore};
  }
  // 序盤(マナ≤6)は重複チャージを避ける：bestが重複札なら、非重複の代替を探して差し替える。
  // 重複の召喚メリットより、2でまとめて飛ぶリスクを重く見る。
  if(best.card && best.isDup && totalMana(p)<=6){
    const me3=G.players[p];
    let alt=null;
    for(const card of hand){
      if(card.num===0)continue;
      if(protectedIds.has(card.id))continue; // 召喚予定カードは代替チャージにも使わない
      const sc=me3.mana.filter(c=>c.num===card.num).length+me3.field.filter(c=>c.num===card.num).length;
      if(card.num!==4 && sc>0)continue; // これも重複→除外
      const k=cpuKeepValue(p,card,cpuEvalBoard(p));
      if(!alt||k<alt.k)alt={card,k};
    }
    if(alt) best={card:alt.card,projected:0,chargeScore:0};
    // 非重複の代替が無ければ、重複してまで置かず見送る（序盤で無理にマナを増やさない）
    else if(totalMana(p)>=2) return null;
  }

  // どのチャージも「今ターンの召喚価値」を増やさない（=今は何も出せない/出せる物は変わらない）
  // → look-aheadで決められないので、将来のために最も手放してよい札を置く。
  //   主要札(0/2/7/9/8など温存価値が高い物)は残し、keepの低い札を選ぶ。
  if(!anyChargeEnablesSummon){
    const cur=totalMana(p);
    const ctx=cpuEvalBoard(p);
    const me=G.players[p];
    // 相手が2(ヒラボン)を使える蓋然性。高いほど「マナに同番号を並べる」のは危険。
    const hirabProb=cpuHirabonThreatProb(p);
    // 最も「手放してよい」札を選ぶ（0は除外）。
    // 評価 = keep + 重複ペナルティ（マナに同番号があると2の宣言で両方飛ぶ）。
    // この評価値が最小の札をチャージする。
    let lowest=null;
    for(const card of hand){
      if(card.num===0)continue;
      if(protectedIds.has(card.id))continue; // 召喚予定カードは温存（チャージしない）
      let effKeep=cpuKeepValue(p,card,ctx);
      // 同じ番号が既にマナ/場にあると、相手の2でまとめて破壊される的になる。
      // 9や同番号を2枚並べる愚を避ける。確率と枚数でペナルティを上乗せ。
      const sameInMana=me.mana.filter(c=>c.num===card.num).length;
      const sameOnField=me.field.filter(c=>c.num===card.num).length;
      if(card.num!==4 && (sameInMana+sameOnField)>0){
        // 4は破壊されてもマナに戻るので例外。それ以外は重複を強く嫌う。
        effKeep += (sameInMana+sameOnField) * (6 + hirabProb*8);
      }
      if(!lowest || effKeep<lowest.effKeep ||
         (effKeep===lowest.effKeep && card.num<lowest.card.num)){
        lowest={card,effKeep,baseKeep:cpuKeepValue(p,card,ctx)};
      }
    }
    if(!lowest) return null;
    // 序盤(マナ≤4)は加速のため置く。ただし重複で危険な札しかないなら置かない判断もする。
    if(cur<=4 || lowest.baseKeep<=3){
      // 重複ペナルティ込みでも置く価値があるか（effKeepが極端に高い=危険なら見送り）
      if(lowest.effKeep>12 && cur>2) return null; // 危険な重複しか置けない→今回は置かない
      return {card:lowest.card, chargeScore:0};
    }
    return null;
  }

  const th=(opts.skipThreshold!==undefined)?opts.skipThreshold:0;
  if(!best.card || best.chargeScore<th && totalMana(p)>4)return null;
  // ── アタック時ヒラボンの布石 ───────────────────────────────────────────
  // 今ターン、場の2でアタック時ヒラボンを撃つ価値があるなら捨て札を1枚確保したい。
  // 特に4はチャージしても、ヒラボンの捨て札にしても結局マナへ行く（同じマナ加速）。
  // それなら4は手札に残してヒラボンの弾にする方が、宣言の除去効果ぶん得をする。
  // ただしこのターンの召喚にそのチャージが必要なとき（projected が伸びるとき）は通常通り優先。
  if(best.card && best.card.num===4 && best.projected<=noChargeProjected+0.01){
    const plan=cpuHirabonAttackPlan(p, cpuEvalBoard(p));
    if(plan && plan.marginal>0){
      // 4を温存し、重複しない非4の代替チャージを探す（無ければ見送って4を弾に残す）
      const meX=G.players[p]; let alt=null;
      for(const card of hand){
        if(card.num===0||card.num===4)continue;
        if(protectedIds.has(card.id))continue;
        const sc=meX.mana.filter(c=>c.num===card.num).length+meX.field.filter(c=>c.num===card.num).length;
        if(sc>0)continue; // 重複は避ける
        const k=cpuKeepValue(p,card,cpuEvalBoard(p));
        if(!alt||k<alt.k)alt={card,k};
      }
      if(alt) return {card:alt.card, chargeScore:0};
      return null;
    }
  }
  return best;
}

/* ════════════════ 6. 攻撃 ════════════════ */
function cpuMaxBlockerPower(ctx){ return ctx.oppUntappedBlockers.reduce((m,c)=>Math.max(m,getAtkPower(c)),0); }
function cpuHasLethal(p,ctx){
  if(ctx.oppUntappedBlockers.length>0)return false;
  const attackers=ctx.me.field.filter(c=>canAttack(p,c)).sort((a,b)=>cpuBreakerCount(b)-cpuBreakerCount(a));
  if(!attackers.length)return false;
  let need=ctx.oppShields,used=0;
  for(const a of attackers){ if(need<=0)break; need-=cpuBreakerCount(a); used++; }
  if(need>0)return false;
  const leftover=attackers.length-used;
  return ctx.oppShields===0?attackers.length>=1:leftover>=1;
}
function cpuScoreAttack(p,atk,target,ctx){
  const aPow=getAtkPower(atk), br=cpuBreakerCount(atk), maxBlk=cpuMaxBlockerPower(ctx);

  // ── ブロッカー温存 ──────────────────────────────────────────────────
  // 自分が劣勢（次ターンに殴られて負けそう）なとき、ブロッカー(1・3)を攻撃に出すと
  // 次の相手ターンに守れなくなる。攻撃するとタップされ防御に使えないため、
  // 「攻撃で割れるシールド価値」より「ブロッカーとして残す価値」が高ければ攻撃しない。
  const isMyBlocker=(atk.num===1||atk.num===3)&&(!atk.linkedWith||atk.linkRoot);
  // 危険度: dangerLevelが低い(＝相手の打点が自分の防御を上回る)ほど温存価値が高い
  // 次ターンに相手の攻撃で負ける可能性があるか（自分のシールド+他のブロッカーで耐えられるか）
  const otherBlockers=ctx.me.field.filter(c=>(c.num===1||c.num===3)&&c.id!==atk.id&&!c.tapped&&(!c.linkedWith||c.linkRoot)).length;
  const survivalAfterAttack=ctx.myShields+otherBlockers; // このブロッカーを攻撃に使った後の防御力
  // 相手の次ターン攻撃可能数（場のクリーチャーのブレイク合計の概算）
  const oppNextThreat=ctx.enUnits.reduce((s,c)=>s+cpuBreakerCount(c),0);
  const wouldLoseIfAttack=survivalAfterAttack<=oppNextThreat && ctx.dangerLevel<=2;
  // 温存ペナルティ（このブロッカーが攻撃するとどれだけ損か）
  const preservePenalty=(isMyBlocker&&wouldLoseIfAttack)?(CPU_W.blocker+CPU_W.defShield)*1.5:0;

  if(target.type==='creature'){
    // ── 防御側は「自分が一番得な応手」を選ぶ前提で評価する ──────────────────
    // タップ済みクリーチャーへの攻撃に対し、防御側は (a)ブロックしない (b)未タップ
    // ブロッカー(1・3)で割り込む、のうち“CPUにとって最も損”な方を選べる。
    // 各応手の決着は execCreatureAttack と同じ (a>=d:相手破壊 / d>=a:攻撃側破壊)。
    // よってCPUから見た価値は各応手の最小値（最悪ケース）とする。
    //   例)「3でタップ6を殴る」→ 相手は放置すれば3が6に負けて勝手に死ぬ＝丸損なので
    //      ブロックせず放置を選ぶ → 価値は負 → この自滅攻撃は選ばれない。
    // ※ 突破して打点を伸ばす“犠牲攻撃”はシールド攻撃側(cpuChooseAttackのオーバーラン
    //    処理)で扱う。クリーチャー攻撃でブロッカーを除去したくても、防御側が得をする
    //    なら相手はブロックしないので、ここで盤面交換以上の価値は見込めない。
    const battle=(defCard)=>{
      const dPow=getAtkPower(defCard);
      if(aPow>dPow)   return cpuRemovalValue(defCard)*CPU_W.removal;                  // 倒して生存
      if(aPow===dPow) return cpuRemovalValue(defCard)*CPU_W.removal-aPow*CPU_W.body;  // 相討ち
      return -aPow*CPU_W.body-0.5;                                                    // 攻撃役だけ死ぬ＝丸損
    };
    let worst=battle(target.card);                 // (a) ブロックされない場合
    for(const b of ctx.oppUntappedBlockers){       // (b) 各ブロッカーで割り込まれた場合
      const v=battle(b);
      if(v<worst)worst=v;
    }
    return worst-preservePenalty;
  }
  if(target.type==='shield'){
    const broken=Math.min(br,ctx.oppShields);
    const shieldVal=broken*(CPU_W.atkShield+ctx.aggro*CPU_W.atkAggro)-CPU_W.stRisk-preservePenalty;
    if(maxBlk<aPow) return shieldVal;  // 勝てる攻撃
    // 自シールド≤1の絶体絶命：ブロッカーに負けても特攻してシールドを割りにいく
    if(ctx.myShields<=1){
      const tradeScore = shieldVal - (maxBlk>aPow ? aPow*CPU_W.body : 0); // 相討ちは本体損なし
      return Math.max(0.1, tradeScore); // 最低でも微正値にして攻撃する意思を保つ
    }
    return (maxBlk>aPow)?-aPow*CPU_W.body:-0.5;
  }
  if(target.type==='direct'){
    if(maxBlk===0)return preservePenalty>0?Math.max(0.1,Infinity):Infinity; // 勝てるなら温存無視
    if(maxBlk>=aPow)return -aPow*CPU_W.body;
    return cpuRemovalValue(ctx.oppUntappedBlockers.reduce((a,b)=>getAtkPower(a)>=getAtkPower(b)?a:b))*CPU_W.removal-preservePenalty;
  }
  return -Infinity;
}
function cpuChooseAttack(p,minScore=0.01){
  const ctx=cpuEvalBoard(p);
  const attackers=ctx.me.field.filter(c=>canAttack(p,c));
  if(!attackers.length)return null;
  const oppTapped=ctx.en.field.filter(c=>c.tapped&&(!c.linkedWith||c.linkRoot));

  // ── オーバーラン検出（物量で押し切れるか）───────────────────────────────
  // ブロッカー(1・3)は1体につき攻撃1回しか止められない（ブロックするとタップされ再ブロック不可）。
  // したがって「攻撃可能クリーチャー数 ＞ 相手の未タップブロッカー数」なら、
  // あふれた攻撃は必ず通る（個々のバトルで負けても数で押し切れる）。
  //   ・相手シールドが0 → あふれた攻撃がダイレクトアタック＝必ず勝てる（score:Infinity）。
  //   ・相手シールドが残っていても → あふれた攻撃でシールドを割れる＝物量で押し切れる。
  //     例：CPUが攻撃役3体・相手ブロッカー1体なら、1体ブロックされても残り2体でシールドを削れる。
  // 当てる順は、ブロッカーが居れば弱い攻撃役から（ブロッカーを1体ずつ消費させ強い攻撃役を温存）、
  // 居なければ最大ブレイカーから（一度に多くのシールドを割る）。
  // ※ 1対1などブロッカーを上回れない場面では従来どおり下の単体評価に任せ、無駄な自滅は避ける。
  if(attackers.length>ctx.oppUntappedBlockers.length){
    let chosen;
    if(ctx.oppUntappedBlockers.length===0){
      // ブロッカー無し：最大ブレイカーで最大量を割る／ダイレクト
      chosen=attackers.slice().sort((a,b)=>cpuBreakerCount(b)-cpuBreakerCount(a))[0];
    }else{
      // ブロッカー有り：弱い攻撃役を先にぶつけてブロッカーを1体ずつ消費させる
      chosen=attackers.slice().sort((a,b)=>getAtkPower(a)-getAtkPower(b))[0];
    }
    if(ctx.oppShields===0){
      return {attacker:chosen,target:{type:'direct'},score:Infinity};   // 勝ち確定
    }
    return {attacker:chosen,target:{type:'shield'},score:1000};         // シールド残りでも物量で押し切る
  }

  const targets=[];
  if(ctx.oppShields>0)targets.push({type:'shield'}); else targets.push({type:'direct'});
  oppTapped.forEach(c=>targets.push({type:'creature',card:c}));
  let best=null;
  for(const atk of attackers)for(const t of targets){
    const score=cpuScoreAttack(p,atk,t,ctx);
    if(score===-Infinity)continue;
    if(!best||score>best.score||(score===best.score&&getAtkPower(atk)<getAtkPower(best.attacker)))
      best={attacker:atk,target:t,score};
  }
  if(!best||best.score<minScore)return null;
  return best;
}

/* ════════════════ 7. 防御 ════════════════ */
function cpuChooseBlock(p,atk,blockers,opts={}){
  if(!blockers||!blockers.length)return {block:false};
  const isDirect=!!opts.isDirect, aPow=getAtkPower(atk), breakers=cpuBreakerCount(atk);
  const myShields=G.players[p].shields.filter(Boolean).length;
  const shieldsSaved=isDirect?0:Math.min(breakers,myShields);
  const sv=CPU_W.defShield;
  const opp=(p===1)?2:1;

  // ── 序盤は攻撃を受けた方が良い場面の判定 ──────────────────────────────
  // ・シールドに余裕がある（受けてもすぐ負けない）
  // ・相手の場に2がいる → 相討ち/ブロックすると2の効果や追撃の余地を残す
  // ・ブロッカーは次ターンの防御に残したい
  // これらが揃うとき、勝てるブロック(一方的に討ち取れる)以外は受ける。
  const oppHas2=G.players[opp].field.some(c=>c.num===2&&(!c.linkedWith||c.linkRoot));
  const shieldRoomy=myShields>=3;                       // シールドにまだ余裕
  // ダイレクト後でも生き残るシールドがあるか（受けてシールドからの逆転札にも期待）
  const canAffordToTake=!isDirect && (myShields-breakers)>=1;
  // 「受け得」を許すのはシングルブレイカー攻撃のみ。
  //  ・1枚しか割られない＝割れたシールドは手札に加わり実質ノーリスクで札が増える
  //  ・ブロッカーは次ターンの防御に温存できる／後続の攻撃を絶てる
  // 一方、0(トリプル)や7/9(ダブル)は一度に複数シールドを失う。
  // 特に0は割られた3枚のうち1枚目が手札ではなく墓地送り（＝シールドから札を得られない）ため
  // 「受ける旨味」が小さい。よってマルチブレイカーは消極化させず、ブロックを優先する。
  const passiveTakeOK = breakers<=1;

  let best={block:false,blocker:null,value:isDirect?-Infinity:0};
  for(const B of blockers){
    const bPow=getAtkPower(B); let value;
    const oneSidedKill=bPow>aPow;                        // 一方的に討ち取れる（ブロッカー生存）
    if(oneSidedKill)value=cpuRemovalValue(atk)*CPU_W.removal+shieldsSaved*sv;
    else if(bPow===aPow)value=cpuRemovalValue(atk)*CPU_W.removal+shieldsSaved*sv-cpuRemovalValue(B);
    else value=shieldsSaved*sv-cpuRemovalValue(B);

    // トリプルブレイカー(0)を受けると割られた3枚のうち1枚は墓地送り（手札に加わらない＝札損）。
    // その損失分だけブロック価値を上乗せし、温存したい場面でも受け止めを優先しやすくする。
    if(!isDirect && atk.num===0) value += sv*CPU_W.tripleBlock;

    // 序盤の受け得補正：一方的キル以外は、受けるメリット分を差し引いて消極的にする（シングルのみ）
    if(!isDirect && !oneSidedKill && shieldRoomy && canAffordToTake && passiveTakeOK){
      // 受ければ：ブロッカーを次ターン防御に温存＋シールドから札を得られる
      const takeBenefit = (cpuRemovalValue(B)*0.8 + CPU_W.defShield*0.5)*CPU_W.takeSingle;
      // 相手に2がいるなら相討ち/チャンプ後の追撃・効果リスクも上乗せで嫌う
      value -= takeBenefit + (oppHas2 ? 2.0 : 0);
    }
    if(isDirect)value+=9999;
    const better=value>best.value||(value===best.value&&best.blocker&&cpuRemovalValue(B)<cpuRemovalValue(best.blocker));
    if(!best.block?value>best.value:better)best={block:true,blocker:B,value};
  }
  if(!isDirect&&(!best.block||best.value<=0))return {block:false};
  return best;
}
function cpuChooseSTPlan(p){
  const opp=(p===1)?2:1, sts=G.pendingST.filter(s=>s.player===p), plan=[];
  const oppCanAttack=G.players[opp].field.some(c=>!c.tapped&&(!c.linkedWith||c.linkRoot));
  sts.filter(s=>s.card.num===8).forEach(s=>plan.push({id:s.card.id,action:oppCanAttack?'activate':'hand'}));
  sts.filter(s=>s.card.num===6).forEach(s=>plan.push({id:s.card.id,action:'activate'}));
  sts.filter(s=>s.card.num!==6&&s.card.num!==8).forEach(s=>plan.push({id:s.card.id,action:'hand'}));
  return plan;
}
// 6(渡辺)の効果で相手フィールドの1枚を手札に戻すときの戻し先選択。
//  ・自分のシールドが少なく、相手の攻撃を止めきれない（ダイレクトアタックの危険がある）とき：
//      → これから殴ってくる「未タップの攻撃可能カード」を優先的に戻して攻撃を1体減らす。
//        ブレイク数の多い脅威（0など）から先に処理する。
//  ・危険が小さいとき：盤面で最も強い／価値の高いカード（0など）を戻して相手戦力を削ぐ。
//  ・2(ヒラボン)は戻すと次ターンに召喚時効果（番号指定の全体破壊）を再利用されるため優先度を下げる。
//    ただし危険時に唯一の脅威が2であれば、生存を優先して戻せるよう加点幅を大きく取る。
function cpuChoose6Bounce(p,targets){
  if(!targets||!targets.length)return null;
  const opp=(p===1)?2:1;
  const myShields=G.players[p].shields.filter(Boolean).length;

  // ST6は防御中（相手の攻撃フェーズ）に誘発する。相手の「まだ攻撃できる」未タップ・非召喚酔いの
  // カードが今ターンの残り脅威。自分の未タップブロッカー(1・3)は1体につき相手1体の攻撃を止める。
  const oppAttackers=G.players[opp].field.filter(c=>canAttack(opp,c));
  let blockersLeft=G.players[p].field.filter(
    c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot)).length;
  // ブロッカーで止めきれない攻撃のブレイク合計＝割られるシールド量（脅威の大きい順から止めると仮定）
  let incoming=0;
  oppAttackers.slice().sort((a,b)=>cpuBreakerCount(b)-cpuBreakerCount(a)).forEach(c=>{
    if(blockersLeft>0){ blockersLeft--; } else { incoming+=cpuBreakerCount(c); }
  });
  // 残りシールドを割り切られる（＝ダイレクトアタック圏）なら危険。
  const inDanger = myShields<=incoming;

  function score(c){
    let s=cpuRemovalValue(c);                       // 基本：強い/価値の高いカードほど高評価（0など）
    // 未タップ（これから攻撃できる）カードは「今ターンの追撃」も「次ターンの再攻撃」もできる
    // 現実的な脅威。タップ済みは今ターンもう動けず、脅威が一段低い。
    // よって同価値（同番号など）が並ぶなら未タップを優先して戻し、直後の攻撃を止める。
    // 例：相手フィールドにタップ3・アンタップ3が並ぶ → アンタップ3を戻して次の攻撃を防ぐ
    //     （タップ3はどのみち次ターンまで攻撃できない）。
    if(canAttack(opp,c)){
      // 危険時は今ターンの被弾阻止を最優先で大きく加点。平時でも未タップ＝即時脅威を優先。
      s += inDanger ? (100 + cpuBreakerCount(c)*6) : (3 + cpuBreakerCount(c));
    }else if(inDanger){
      s -= 50;                                       // タップ済み＝今ターンの脅威ではない→後回し
    }
    if(c.num===2) s -= 8;                            // 2は戻すと次ターン効果を再利用される→優先度を下げる
    return s;
  }
  return targets.reduce((a,b)=>score(a)>=score(b)?a:b);
}

function cpuFindCardZone(p,id){

}
function cpuTryLinks(p){

// CPUのエクTジア演出：成立は確実（人間のような順番チャレンジは無し）だが、
// 見栄えのため手札にある0を「足りない色だけ」場に1枚ずつ召喚し、4色そろえてから
// 「エクTジア！」を表示して勝利する。勝ち確定の局面なので5の墓地回収などの副作用は通さない。
function cpuDeclareExTjia(p){
  if(CPU._exTjiaDeclaring)return;     // 二重起動防止
  CPU._exTjiaDeclaring=true;
  const pl=G.players[p];
  const order=['blue','green','yellow','red'];   // 並べる順（演出用）
  const onField=new Set(pl.field.filter(c=>c.num===0).map(c=>c.color));
  // 場に足りない色の0を手札から探して召喚キューに積む
  const queue=[];
  for(const col of order){
    if(onField.has(col))continue;
    const z=pl.hand.find(c=>c.num===0&&c.color===col);
    if(z)queue.push(z);
  }
  toast('CPU: ⭐エクTジア宣言！');
  const finish=()=>{
    if(G.gameOver)return;
    renderAll();
    setTimeout(()=>{
      if(typeof playExTBGM==='function')playExTBGM('bgm-ext');
      if(typeof fxExTjia==='function')fxExTjia(p);
      toast('CPU: 🎉 エクTジア成立！！');
      setTimeout(()=>winGame(p,'エクTジア！（0の4色）'),1400);
    },500);
  };
  const summonNext=()=>{
    if(G.gameOver)return;
    if(!queue.length){ finish(); return; }
    const z=queue.shift();
    pl.hand=pl.hand.filter(c=>c.id!==z.id);
    z.tapped=false; z.summonedThisTurn=true; z.linkedWith=null; z.linkRoot=false; z.speedAttacker=false;
    pl.field.push(z);
    if(typeof fxSummon==='function')fxSummon(p,z);
    toast(`CPU: ${CJ[z.color]}0 を召喚`);
    renderAll();
    setTimeout(summonNext,750);
  };
  setTimeout(summonNext,500);
}
// 召喚1手
function cpuSummonStep(p){
  if(G.gameOver)return;
  if(G.turn!==p)return;  // ターンが変わっていたら古いsetTimeoutを無視（突然自分のターンになるバグ防止）
  // エクTジア成立なら勝利（成立は確実）。演出として手札の0を場に並べてから宣言する。
  if(hasExTjia(p)){ cpuDeclareExTjia(p); return; }
  if(cpuTryLinks(p))return;                          // リンク（doLinkがphaseSummonを再呼び出し）
  const pick=cpuChooseBestPlay(p);
  if(pick){ cpuExecSummon(p,pick); return; }

}
function cpuExecSummon(p,pick){

// 攻撃1手
// ═══════════════════════════════════════════════════════════════════════
//  アタック時ヒラボン（手札1枚捨て→数字宣言→両者破壊→1回攻撃）の評価と実行
// ═══════════════════════════════════════════════════════════════════════
// 通常攻撃は宣言なしでもできるので、ここで測るのは「宣言する追加価値 − 手札を1枚失うコスト」。
//   ・宣言の盤面利益(b.gain)＝相手カード除去 ＋ ブロッカー(3など)除去で攻撃が通る突破価値
//     （cpuHirabonBestが両方を内包して算出。相手0が複数なら除去価値が大きい＝高評価）
//   ・捨て札コスト＝手放すカードのkeep値。手札が薄い(2枚以下)ほど痛手として加点。
//   ・例外：4を捨てるとsendToGraveでマナへ行く＝チャージ相当＋効果なので捨て得。
function cpuHirabonAttackPlan(p, ctx){
  const me=G.players[p];
  // 攻撃できる場の2（リンクのサブカードは個別攻撃不可なので除外）
  const attacker=me.field.find(c=>c.num===2 && canAttack(p,c) && (!c.linkedWith||c.linkRoot));
  if(!attacker) return null;
  if(!me.hand.length) return null;          // 捨てる手札が無ければ発動不可
  const b=cpuHirabonBest(ctx);
  if(b.gain<=0) return null;                // 宣言しても盤面利益が無い＝手札だけ損
  if(b.num===2) return null;                // 自分の攻撃役2を巻き込む宣言はしない

  // 捨て札の選定：最も手放してよい1枚。0は絶対に捨てない。4はマナ送りなので捨て得。
  let bestDiscard=null;
  for(const c of me.hand){
    if(c.num===0) continue;
    let cost=cpuKeepValue(p,c,ctx);
    if(c.num===4) cost-=(CPU_W.mana4+1.0);  // 捨ててもマナに行く＝チャージ＋効果のおまけ
    if(!bestDiscard || cost<bestDiscard.cost) bestDiscard={card:c,cost};
  }
  if(!bestDiscard) return null;             // 手札が0しかない等

  // 手札が薄いほど1枚失う痛みは大きい（特に2枚以下）。
  const handAfter=me.hand.length-1;
  let handPenalty=0;
  if(handAfter<=1) handPenalty=8;
  else if(handAfter<=2) handPenalty=3;

  const marginal=b.gain - bestDiscard.cost - handPenalty;
  return {attacker, declareNum:b.num, gain:b.gain, discardCard:bestDiscard.card, discardCost:bestDiscard.cost, marginal};
}
// ヒラボン後、指定の攻撃役で1回だけ攻撃する（ブロック確認は通常通り防御側に出す）
function cpuExecSingleAttack(p, atk){
  const opp=p===1?2:1;
  const ctx=cpuEvalBoard(p);
  const targets=[];
  if(ctx.oppShields>0)targets.push({type:'shield'}); else targets.push({type:'direct'});
  ctx.en.field.filter(c=>c.tapped&&(!c.linkedWith||c.linkRoot)).forEach(c=>targets.push({type:'creature',card:c}));
  let best=null;
  for(const t of targets){
    const s=cpuScoreAttack(p,atk,t,ctx);
    if(s===-Infinity)continue;
    if(!best||s>best.score)best={t,score:s};
  }
  const tgt=best?best.t:(ctx.oppShields>0?{type:'shield'}:{type:'direct'});
  CPU._busy=true;
  toast(`CPU: ${CJ[atk.color]}${atk.num} で攻撃`);
  setTimeout(()=>{
    if(G.gameOver)return;
    if(tgt.type==='shield') execShieldAttack(atk,p);
    else if(tgt.type==='direct'){
      const bl=G.players[opp].field.filter(c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot));
      execDirectWithBlock(atk,p,bl);
    }else{
      const tc=G.players[opp].field.find(c=>c.id===tgt.card.id);
      if(tc)execCreatureAttackWithBlock(atk,tc,p); else execShieldAttack(atk,p);
    }
  },450);
}
// アタック時ヒラボン一式を実行：捨て→宣言→両者破壊→攻撃
function cpuExecHirabonAttack(p, hp){
  const opp=p===1?2:1, dc=hp.discardCard;
  // 1) 手札を1枚捨てる（4はsendToGraveの仕様でマナへ行く）
  G.players[p].hand=G.players[p].hand.filter(c=>c.id!==dc.id);
  sendToGrave(p,dc);
  toast(`CPU: ${CJ[dc.color]}${dc.num}を捨ててヒラボン発動！`);
  if(typeof fxEffect==='function')fxEffect(p,'ヒラボン！');
  renderAll();
  // 2) 数字宣言→両者破壊
  setTimeout(()=>{
    if(G.gameOver)return;
    const num=hp.declareNum;
    toast(`CPU: ヒラボン宣言 → ${num}`);
    destroyByNum(p,num); destroyByNum(opp,num);
    if(typeof fxHirabon==='function')fxHirabon(p,num);
    renderAll(); checkExTjia(p);
    // 3) 攻撃役が生き残っていれば1回攻撃。巻き添えで消えていればループ続行。
    setTimeout(()=>{
      if(G.gameOver)return;
      const atk=G.players[p].field.find(c=>c.id===hp.attacker.id);
      if(!atk){ CPU._busy=false; setTimeout(()=>cpuAttackStep(p),150); return; }
      cpuExecSingleAttack(p, atk);
    },650);
  },600);
}
function cpuAttackStep(p){
  if(G.gameOver)return;
  if(G.turn!==p||G.phase!=='attack')return; // ターン/フェーズが変わっていたら古いsetTimeoutを無視
  // 相手(あなた)の防御操作が残っている間は待つ：
  //  ・pendingST（シールドトリガーの発動選択）
  //  ・モーダル表示中（ST/シールド確認/ブロック選択など）
  const m=document.getElementById('modal-overlay');
  const modalOpen=!!(m&&m.classList&&m.classList.contains('show'));
  if(G.pendingST.length||modalOpen){ setTimeout(()=>cpuAttackStep(p),450); return; }
  if(CPU._busy)return;            // 重複したphaseAttack呼び出しによる多重攻撃を防止
  // ── アタック時ヒラボン（1ターン1回）────────────────────────────────────
  // 既にダイレクト勝ちが確定しているなら手札を切らずそのまま殴る。
  // そうでなければ、宣言の盤面利益（除去＋ブロッカー突破）が捨て札コストを十分上回るとき発動。
  if(!CPU._hirabonAttackDone){
    const hctx=cpuEvalBoard(p);
    if(!cpuHasLethal(p,hctx)){
      const hp=cpuHirabonAttackPlan(p,hctx);
      if(hp && hp.marginal>2){
        CPU._hirabonAttackDone=true;
        CPU._busy=true;
        cpuExecHirabonAttack(p,hp);
        return;
      }
    }
  }
  const a=cpuChooseAttack(p);
  if(!a){ CPU._busy=false; setTimeout(()=>{ if(!G.gameOver) endTurn(); },300); return; }
  CPU._busy=true;
  const atk=a.attacker, opp=p===1?2:1;
  G.atkCard=null;
  toast(`CPU: ${CJ[atk.color]}${atk.num} で攻撃`);
  setTimeout(()=>{
    if(G.gameOver)return;
    if(a.target.type==='shield') execShieldAttack(atk,p);
    else if(a.target.type==='direct'){
      const bl=G.players[opp].field.filter(c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot));
      execDirectWithBlock(atk,p,bl);
    }else{
      const t=G.players[opp].field.find(c=>c.id===a.target.card.id);
      if(t)execCreatureAttackWithBlock(atk,t,p); else { CPU._busy=false; setTimeout(()=>cpuAttackStep(p),100); }
    }
  },550);
}

// CPUがクリーチャー（タップ済みナンバーズ）を攻撃するとき、防御側にブロックの機会を与える。
// 従来はexecCreatureAttackを直接呼んでいたため、防御側(人間)のブロッカー(1・3)が
// アンタップでもブロックモーダルが出ず、5+5リンク等が問答無用で討ち取られていた。
function execCreatureAttackWithBlock(atk,target,p){
  const opp=p===1?2:1;
  // 攻撃対象自身はブロッカーに使えない（タップ済みでもあるため元々対象外だが念のため除外）
  const blockers=G.players[opp].field.filter(
    c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot)&&c.id!==target.id
  );
  if(!blockers.length){ fxAttack(atk,p,target,opp); setTimeout(()=>execCreatureAttack(atk,target,p),500); return; }
  // 防御側もCPUの場合（通常は起きないが保険）：自動でブロック判断
  if(!ONLINE.enabled && isCpu(opp)){
    const d=cpuChooseBlock(opp,atk,blockers,{isDirect:false});
    if(d.block) cpuDoBlock(atk,p,d.blocker,opp);
    else { fxAttack(atk,p,target,opp); setTimeout(()=>execCreatureAttack(atk,target,p),500); }
    return;
  }
  // 防御側は人間：ブロック確認モーダルを表示（シールド/ダイレクト攻撃と同じ体験）
  showSimpleModal(`🛡 ${atkLabel(atk)} が ${atkLabel(target)} を攻撃！ ブロックしますか？`,[
    {label:'ブロックする',cls:'g',fn:()=>{closeModal();showBlockPicker(atk,p,blockers,{type:'creature',card:target});}},
    {label:'ブロックしない',cls:'r',fn:()=>{
      closeModal();
      fxAttack(atk,p,target,opp);
      setTimeout(()=>execCreatureAttack(atk,target,p),500);
    }},
  ],`${atkLabel(atk)}(ATK:${getAtkPower(atk)}) vs ${atkLabel(target)}　ブロッカー: ${blockers.map(c=>CJ[c.color]+c.num).join('/')}`,opp);
}

    G.players[opp].field=G.players[opp].field.filter(c=>c.id!==chosen.id);
    G.players[opp].hand.push(chosen);
    fxEffect(p,'👋 退部！'); toast(`CPU: 退部！ ${CJ[chosen.color]}${chosen.num}を戻した`);
    renderAll(); after6Bounce(p); return;
  }
  _orig6Bounce.apply(this,arguments);
};
const _orig7Pick=show7PickModal;
show7PickModal=function(p){
  if(isCpu(p)){
    G._7selectMode=null;
    const plan=CPU._7plan||{chain:[],final:null,finalMove:null};
    // 連鎖：手札/マナ/墓地の別の7を場に出す（exec7Moveが再びshow7PickModalを呼ぶ）
    if(plan.chain&&plan.chain.length){
      const id=plan.chain.shift();
      const found=cpuFindCardZone(p,id);
      if(found){
        G.players[p][found.zone]=G.players[p][found.zone].filter(c=>c.id!==id);
        found.card._faceDown=false;
        toast('CPU: 7連鎖！');
        setTimeout(()=>exec7Move(p,found.card,p,'field',p),400);
        return;
      }
    }
    // 連鎖終了：攻守バランスで決めた最善手(finalMove)を実行
    const fm=plan.finalMove;
    if(fm){
      CPU._7plan=null;
      const owner=fm.fromOwner;
      const zone=fm.fromZone||'field';
      let tgt=null;
      if(zone==='shield'){
        // 相手シールド先頭（裏向き）を取り出す
        const sh=G.players[owner].shields;
        let idx=(fm.shieldIdx!=null && sh[fm.shieldIdx])?fm.shieldIdx:sh.findIndex(s=>s!==null);
        if(idx!==-1 && sh[idx]){ tgt=sh[idx]; sh[idx]=null; tgt._faceDown=true; }
      }else if(zone==='deck'){
        const dk=G.players[owner].deck;
        tgt=dk[dk.length-1]; if(tgt){ dk.pop(); tgt._faceDown=true; }
      }else{
        // field / hand / mana / grave(=graveyard)
        const zarr=(zone==='grave')?'graveyard':zone;
        tgt=(G.players[owner][zarr]||[]).find(c=>c.id===(fm.card&&fm.card.id))
            || G.players[owner].field.find(c=>c.id===(fm.card&&fm.card.id));
        if(tgt){
          // 元ゾーンから取り除く（リンク解除は exec7Move 側で実施）
          ['field','hand','mana','graveyard'].forEach(z=>{
            G.players[owner][z]=G.players[owner][z].filter(c=>c.id!==tgt.id);
          });
        }
      }
      if(tgt){
        toast(`CPU: 7効果 → ${fm.label}`);
        setTimeout(()=>exec7Move(p,tgt,owner,fm.dest,fm.toOwner),400);
        return;
      }
    }
    // フォールバック（旧プラン）：最強の敵をデッキ送り
    if(plan.final!=null){
      const opp=p===1?2:1;
      const tgt=G.players[opp].field.find(c=>c.id===plan.final);
      CPU._7plan=null;
      if(tgt){
        G.players[opp].field=G.players[opp].field.filter(c=>c.id!==plan.final);
        toast(`CPU: 7効果 → ${CJ[tgt.color]}${tgt.num}をデッキ送り`);
        setTimeout(()=>exec7Move(p,tgt,opp,'deck',opp),400);
        return;
      }
    }
    CPU._7plan=null; G._7selectMode=null;
    checkExTjia(p); setTimeout(()=>{ if(G.phase==='summon')phaseSummon(); },400);
    return;
  }
  _orig7Pick.apply(this,arguments);
};
const _origPick5=pick5Grave;
pick5Grave=function(p,remaining){
  if(isCpu(p)){
    const grave=G.players[p].graveyard;
    if(!remaining||!grave.length){ checkExTjia(p); setTimeout(()=>{ if(G.phase==='summon')phaseSummon(); },400); return; }
    // 価値の高い（番号の大きい）カードからマナへ回収
    const sorted=[...grave].sort((a,b)=>getAtkPower(b)-getAtkPower(a));
    const pick=sorted[0];
    G.players[p].graveyard=G.players[p].graveyard.filter(c=>c.id!==pick.id);
    pick.tapped=false; G.players[p].mana.push(pick);
    toast(`CPU: ${CJ[pick.color]}${pick.num}をマナへ`); renderAll();
    if(remaining-1>0&&G.players[p].graveyard.length) setTimeout(()=>pick5Grave(p,remaining-1),300);
    else { checkExTjia(p); setTimeout(()=>{ if(G.phase==='summon')phaseSummon(); },400); }
    return;
  }
  _origPick5.apply(this,arguments);
};

// --- 防御：ブロック判断（CPUが守備側のとき自動） ---
// 保険：showSimpleModalがCPU向け(forPlayer=CPU.player)のブロック確認を出そうとしたら、
// モーダルを表示せず「ブロックする/しない」のボタン関数を直接呼んで自動解決する。
// これは何らかの理由でshieldAttack/directWithBlockのCPU分岐をすり抜けた場合の保険。
const _origShowSimpleModal = (typeof showSimpleModal === 'function') ? showSimpleModal : null;
if(_origShowSimpleModal){
  showSimpleModal = function(title, btns, desc, forPlayer){
    const isBlockConfirm = typeof title==='string' && title.indexOf('ブロックしますか')>=0;
    if(CPU.enabled && !ONLINE.enabled && Number(forPlayer)===Number(CPU.player) && isBlockConfirm){
      // ブロックボタン(cls:'g')と非ブロックボタン(cls:'r')を取り出す
      const blockBtn   = btns && btns.find(b=>b.cls==='g');
      const noBlockBtn = btns && btns.find(b=>b.cls==='r');
      // descに「ブロッカー: 赤1 / 青3」が入っているのでそこからブロッカーを推定…するより
      // 「攻撃しないと敗北するかどうか」=非ブロックボタンのラベルに「ダイレクト」が含まれるかで判定する
      const isDirect = (noBlockBtn && /ダイレクト/.test(noBlockBtn.label));
      // CPUの判断：シールド残=自分なのでmyShieldsから判定。ここでは簡易に
      //   isDirect=trueなら必ずブロック、それ以外は「描画されているブロッカー数があるならブロックを試みる」
      // 厳密な評価は cpuChooseBlock を使いたいが、atk/blockers の参照がここに無いので、
      // 「ブロックする」ボタンを呼ぶことでshowBlockPicker経由で本体の選択に任せ、
      // その先のshowBlockPickerもCPU向けなら自動化する（下のパッチで対応）。
      setTimeout(()=>{
        if(isDirect && blockBtn){ blockBtn.fn(); }
        else if(blockBtn){ blockBtn.fn(); }   // CPUは基本ブロックを試みる→showBlockPicker側で最終判断
        else if(noBlockBtn){ noBlockBtn.fn(); }
      }, 200);
      return;  // モーダルを表示しない
    }
    return _origShowSimpleModal.apply(this, arguments);
  };
}

// showBlockPickerもCPU向けなら自動でブロッカーを選択
const _origShowBlockPicker = (typeof showBlockPicker === 'function') ? showBlockPicker : null;
if(_origShowBlockPicker){
  showBlockPicker = function(atk, p, blockers, attackInfo){
    const opp = (p===1)?2:1;
    if(CPU.enabled && !ONLINE.enabled && Number(opp)===Number(CPU.player)){
      const myShields = G.players[opp].shields.filter(Boolean).length;
      // 攻撃種別を attackInfo から判定（creature=ナンバーズ攻撃 / direct / shield）。
      // attackInfo が無い場合のみ従来通りシールド数でダイレクト判定にフォールバック。
      const isCreature = !!(attackInfo && attackInfo.type==='creature' && attackInfo.card);
      const isDirect   = !!(attackInfo ? attackInfo.type==='direct' : (myShields===0));
      const d = cpuChooseBlock(opp, atk, blockers, { isDirect });
      if(d.block){
        cpuDoBlock(atk,p,d.blocker,opp);
      }else{
        // ブロックしない判定 → 本来選ばれた攻撃対象へ正しく解決する
        if(isCreature){
          // ★バグ修正：ナンバーズ攻撃はシールドではなく対象クリーチャーとバトルする
          const target = G.players[opp].field.find(c=>c.id===attackInfo.card.id) || attackInfo.card;
          fxAttack(atk,p,target,opp);
          setTimeout(()=>execCreatureAttack(atk,target,p),500);
        }else if(isDirect){
          execDirectAttack(atk,p);
        }else{
          doShieldBreak(atk,p);
        }
      }
      return;
    }
    return _origShowBlockPicker.apply(this, arguments);
  };
}

// CPUがブロックを実行する共通処理：ブロッカーをタップしてからクリーチャー戦に入る
function cpuDoBlock(atk,p,blocker,opp){
  blocker.tapped=true;                          // ブロックしたブロッカーはタップされる
  if(blocker.linkedWith)blocker.linkedWith.tapped=true;
  toast(`CPU: ${CJ[blocker.color]}${blocker.num}でブロック`);
  fxBlock(atk,p,blocker,opp);
  setTimeout(()=>execCreatureAttack(atk,blocker,p),600);
}

const _origShieldAtk=execShieldAttack;
execShieldAttack=function(atk,p){
  const opp=p===1?2:1;
  if(!ONLINE.enabled && isCpu(opp)){
    const blockers=G.players[opp].field.filter(c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot));
    const d=cpuChooseBlock(opp,atk,blockers,{isDirect:false});
    if(d.block){ cpuDoBlock(atk,p,d.blocker,opp); }
    else doShieldBreak(atk,p);
    return;
  }
  _origShieldAtk.apply(this,arguments);
};
const _origDirect=execDirectWithBlock;
execDirectWithBlock=function(atk,p,blockers){
  const opp=p===1?2:1;
  if(!ONLINE.enabled && isCpu(opp)){
    const bl=blockers||G.players[opp].field.filter(c=>(c.num===1||c.num===3)&&!c.tapped&&(!c.linkedWith||c.linkRoot));
    const d=cpuChooseBlock(opp,atk,bl,{isDirect:true});
    if(d.block){ cpuDoBlock(atk,p,d.blocker,opp); }
    else execDirectAttack(atk,p);
    return;
  }
  _origDirect.apply(this,arguments);
};

// --- 防御：シールド確認（通常札）・ST（CPUが守備側のとき自動） ---
const _origBreakShield=breakShield;
breakShield=function(targetP,sc){
  if(!ONLINE.enabled){
    // ── CPU攻撃 → P1(人間)防御 ──────────────────────────────────────
    // OKコールバックにターンチェックを付けてstaleなphaseAttack発火を防ぐ
    if(isCpu(G.turn) && !isCpu(targetP)){
      if(sc.num===6||sc.num===8){
        G.pendingST.push({player:targetP,card:sc});
        processST(); return;
      }
      if(sc._faceDown)sc._faceDown=false;
      G.players[targetP].hand.push(sc);
      renderAll();
      const capturedTurn=G.turn; // このモーダルを出した時点のターンを記憶
      showSimpleModal('シールド確認',[{label:'OK',cls:'g',fn:()=>{
        closeModal();
        // まだCPUのターン中なら攻撃継続。ターンが変わっていればモーダルを閉じるだけ
        if(G.phase==='attack'&&G.turn===capturedTurn)setTimeout(phaseAttack,200);
      }}],'シールドが手札に加わりました',targetP);
      return;
    }
    // ── P1攻撃 → CPU(P2)防御 ──────────────────────────────────────
    if(isCpu(targetP)&&sc.num!==6&&sc.num!==8){
      if(sc._faceDown)sc._faceDown=false;
      G.players[targetP].hand.push(sc);
      renderAll();
      if(G.phase==='attack')setTimeout(phaseAttack,250);
      return;
    }
  }
  _origBreakShield.apply(this,arguments);
};
// checkDirect が setTimeout(phaseAttack,400) を積む → ターン変化後に誤発火するのを防ぐ
// CPU攻撃時はOKボタン(ターンチェック付き)またはstFinishが継続を担うので不要
const _origCheckDirect=checkDirect;
checkDirect=function(targetP,attP){
  if(CPU.enabled&&!ONLINE.enabled&&isCpu(attP))return;
  _origCheckDirect.apply(this,arguments);
};

const _origProcessST=processST;
processST=function(){
  if(G.pendingST.length && !ONLINE.enabled && isCpu(G.pendingST[0].player)){
    cpuResolveSTs(G.pendingST[0].player);
    return;
  }
  _origProcessST.apply(this,arguments);
};
function cpuResolveSTs(player){
  const plan=cpuChooseSTPlan(player); let i=0;
  const step=()=>{
    if(i>=plan.length){ stFinish(); return; }
    const {id,action}=plan[i++];
    const st=G.pendingST.find(s=>s.card.id===id);
    if(!st){ step(); return; }
    G.pendingST=G.pendingST.filter(s=>s.card.id!==id);
    if(action==='activate'){ toast(`CPU: ST ${CJ[st.card.color]}${st.card.num} 発動`); activateST(st); }
    else { G.players[player].hand.push(st.card); renderAll(); }
    setTimeout(step,750);
  };
  step();
}

// --- リンク破壊時／6リンク選択（CPU所有なら自動：価値の低い方を手放す） ---
const _origBreakLinked=breakLinkedPair;
breakLinkedPair=function(owner,card){
  if(isCpu(owner) && card.linkedWith){
    const partner=card.linkedWith;
    card.linkedWith=null; card.linkRoot=false; card.speedAttacker=false;
    partner.linkedWith=null; partner.linkRoot=false; partner.speedAttacker=false;
    G.players[owner].field=G.players[owner].field.filter(c=>c.id!==card.id&&c.id!==partner.id);
    // 価値の低い方を墓地へ、高い方を場に残す
    const toGrave=cpuRemovalValue(card)<=cpuRemovalValue(partner)?card:partner;
    const keep=(toGrave===card)?partner:card;
    sendToGrave(owner,toGrave);
    keep.tapped=true; G.players[owner].field.push(keep);
    renderAll(); return;
  }
  _origBreakLinked.apply(this,arguments);
};
const _orig6Linked=show6LinkedChoiceModal;
show6LinkedChoiceModal=function(p,opp,cardA,cardB){
  if(!ONLINE.enabled && isCpu(opp)){
    // CPUの所有ペアが戻される：価値の低い方を手札へ、高い方を場に残す
    const toHand=cpuRemovalValue(cardA)<=cpuRemovalValue(cardB)?cardA:cardB;
    const keep=(toHand===cardA)?cardB:cardA;
    cardA.linkedWith=null;cardA.linkRoot=false;cardA.speedAttacker=false;
    cardB.linkedWith=null;cardB.linkRoot=false;cardB.speedAttacker=false;
    G.players[opp].field=G.players[opp].field.filter(c=>c.id!==toHand.id);
    toHand.tapped=false; G.players[opp].hand.push(toHand);
    fxEffect(p,'👋 退部！'); toast(`CPU: ${CJ[toHand.color]}${toHand.num}を手札へ`);
    renderAll(); after6Bounce(p); return;
  }
  _orig6Linked.apply(this,arguments);
};

/* ════════════════ 10. 起動＆ボタン配線 ════════════════ */
// CPU対戦では相手(P2=CPU)の手札を常に裏向きにする（自分=P1のみ表向き）
const _origRenderHand=renderHand;
renderHand=function(p){
  if(CPU.enabled && !ONLINE.enabled){
    const el=document.getElementById('p'+p+'-hand'); if(!el)return;
    // 自分(P1)は常に表。CPU(P2)は通常裏向き、デバッグモード(revealHand)なら表向き
    const showFront=(parseInt(p)===1)||CPU.revealHand;
    el.innerHTML=showFront
      ?G.players[p].hand.map(c=>cardHTML(c,'hand',p)).join('')
      :G.players[p].hand.map(()=>'<div class="card card-back"><div class="uno-oval" style="background:rgba(255,255,255,.25)"></div><div class="cn" style="font-size:14px">T</div></div>').join('');
    return;
  }
  _origRenderHand.apply(this,arguments);
};
function startCpuGame(opts){
  // opts: true(後方互換=手札公開) または {revealHand, tokuda}
  let revealHand=false, tokuda=false;
  if(opts===true)revealHand=true;
  else if(opts&&typeof opts==='object'){ revealHand=!!opts.revealHand; tokuda=!!opts.tokuda; }
  CPU.enabled=true; CPU.player=2; CPU._plan=null; CPU._7plan=null;
  CPU.revealHand=revealHand; CPU.tokuda=tokuda;
  ONLINE.enabled=false; ONLINE.roomId=null; ONLINE.myPlayer=null;
  ONLINE.names={1:'あなた',2:(tokuda?'😈 徳田さん':(revealHand?'🔍 CPU(公開)':'🤖 CPU'))};
  startGame();
}
// ローカル/オンライン開始時はCPUを無効化
const _origStartOffline=startOffline;
startOffline=function(){ CPU.enabled=false; _origStartOffline.apply(this,arguments); };
const _origShowOnlineMenu=showOnlineMenu;
showOnlineMenu=function(){ CPU.enabled=false; _origShowOnlineMenu.apply(this,arguments); };

// タイトル画面表示時にCPUボタンを配線（showTitleScreenはlocal/onlineのみ配線するため補う）
const _origShowTitle=showTitleScreen;
showTitleScreen=function(){
  _origShowTitle.apply(this,arguments);
  const cpuBtn=document.getElementById('title-cpu-btn');
  if(cpuBtn) cpuBtn.onclick=()=>{ hideTitleScreen(); startCpuGame({revealHand:false,tokuda:false}); };
  const dbgBtn=document.getElementById('title-cpu-debug-btn');
  if(dbgBtn) dbgBtn.onclick=()=>{ hideTitleScreen(); startCpuGame({revealHand:true,tokuda:false}); };
  const tokudaBtn=document.getElementById('title-cpu-tokuda-btn');
  if(tokudaBtn) tokudaBtn.onclick=()=>{ hideTitleScreen(); startCpuGame({revealHand:false,tokuda:true}); };
};
// 初回ロード時にも一応配線
window.addEventListener('DOMContentLoaded',()=>{
  const cpuBtn=document.getElementById('title-cpu-btn');
  if(cpuBtn && !cpuBtn.onclick) cpuBtn.onclick=()=>{ hideTitleScreen(); startCpuGame({revealHand:false,tokuda:false}); };
  const dbgBtn=document.getElementById('title-cpu-debug-btn');
  if(dbgBtn && !dbgBtn.onclick) dbgBtn.onclick=()=>{ hideTitleScreen(); startCpuGame({revealHand:true,tokuda:false}); };
  const tokudaBtn=document.getElementById('title-cpu-tokuda-btn');
  if(tokudaBtn && !tokudaBtn.onclick) tokudaBtn.onclick=()=>{ hideTitleScreen(); startCpuGame({revealHand:false,tokuda:true}); };
});
</script>
